# =============================================================================
# Integration tests
# =============================================================================

# `MlDsaSignature::from_bytes_unchecked` is gated behind
# `test-utils`. The three integration tests below construct
# truncated / zero / ones signatures via that helper to exercise
# verify-side rejection. Mark them as requiring `test-utils` so a
# default `cargo test -p latticearc` skips them rather than failing
# to compile; CI's `--all-features` enables the feature and runs
# them. For local development:
#   cargo test -p latticearc --features test-utils
[[test]]
name = "primitives_ml_dsa"
required-features = ["test-utils"]

[[test]]
name = "primitives_regression"
required-features = ["test-utils"]

[[test]]
name = "primitives_side_channel"
required-features = ["test-utils"]

# file-level `#![cfg(all(feature = "fips-self-test",
# feature = "test-utils"))]` previously made the entire FIPS power-up
# KAT suite invisible to default `cargo test -p latticearc` runs —
# the file compiled to nothing and gave no signal that 13 tests had
# been silently dropped. The `required-features` declaration makes
# cargo skip the test transparently with a visible message instead.
[[test]]
name = "primitives_self_test_conditional_kats"
required-features = ["fips-self-test", "test-utils"]

# =============================================================================
# Benchmarks
# =============================================================================

[[bench]]
name = "benchmarks"
harness = false

[[bench]]
name = "constant_time"
harness = false
