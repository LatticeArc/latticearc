# Shared cargo-deny Configuration for Rust 2024
# Enhanced supply chain security for both Apache and Proprietary repositories
# Using version 2 format for cargo-deny 0.18+

[graph]
# Target platforms for dependency resolution
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
# Use version 2 format
version = 2

# Path to advisory database
db-path = "~/.cargo/advisory-db"

# Advisory database URLs (use official sources only)
db-urls = ["https://github.com/rustsec/advisory-db"]

# Ignore specific advisories (only if necessary)
ignore = [
    # NOTE: RUSTSEC-2026-0097 (rand 0.8 reseed unsoundness) was previously
    # ignored here. Removed in v0.8.0 dep-upgrade pass — workspace is now on
    # rand 0.9.4 / rand_core 0.9 which fixes the underlying unsoundness.
    # The `rand_core 0.6` bridge alias (`rand_core_0_6`, for fn-dsa / dalek
    # 2.x / k256 compat) does NOT trigger the advisory: rand_core 0.6 is
    # used only as type-level glue (OsRng + RngCore traits) when calling
    # those crates, never as a runtime RNG that could exhibit the reseed
    # behaviour.
    # paste 1.0.15 flagged as unmaintained (not a CVE). Pulled in transitively
    # by pqcrypto-mldsa dev-dep used in cross-impl validation tests only; does
    # not affect the published latticearc runtime. Revisit when pqcrypto-mldsa
    # drops the dep upstream.
    "RUSTSEC-2024-0436",
    # ansi_term 0.12.1 unmaintained. Pulled in transitively by clap 2.x via
    # dudect-bencher 0.7 (dev-dep powering examples/dudect_ct.rs). No runtime
    # impact on published crates. Revisit when dudect-bencher migrates to
    # clap 4 or we switch to a different CT-bencher harness.
    "RUSTSEC-2021-0139",
    # atty 0.2.14 unmaintained. Same provenance as ansi_term above
    # (clap 2 → dudect-bencher, dev-only).
    "RUSTSEC-2024-0375",
    # atty 0.2.14 Windows unaligned-pointer unsoundness. Triggers only
    # under custom global allocators on Windows. Our dudect-bencher
    # example is invoked only via `dudect.yml` on ubuntu-latest, never
    # on Windows, and uses the default System allocator regardless.
    # Same provenance (clap 2 → dudect-bencher, dev-only).
    "RUSTSEC-2021-0145",
]

[bans]
# Allow or deny multiple versions of the same crate
multiple-versions = "warn"

# Wildcard dependencies. The workspace policy is exact-pin
# (= "X.Y.Z") for all RustCrypto deps; a `*` dep silently bypasses
# that protection because Cargo treats it as "any version" and
# resolves whatever crates.io currently advertises. `warn` surfaces
# them in CI without breaking transitive deps that genuinely use `*`
# (e.g. some build-only proc-macro deps). Promote to `deny` once the
# dep tree has been audited for incidental `*` requirements.
wildcards = "warn"

# Highlight all issues
highlight = "all"

# Workspace default features (allow)
workspace-default-features = "allow"

# External default features (allow)
external-default-features = "allow"

# Explicitly allowed crates
allow = []

# Explicitly denied crates
# Note: libc is present as a transitive dependency (via aws-lc-sys) — acceptable
# and cannot be denied. nix is banned per project policy (use rustix instead)
# *in our own code*; the `wrappers` exception below allows it only when
# reached via `ctrlc`, which is a transitive dev-dep of `dudect-bencher`
# (powers `examples/dudect_ct.rs`, no runtime impact on published crates).
deny = [
    { crate = "nix", wrappers = ["ctrlc"] },
]

# Skip specific crates
skip = []

# Skip entire dependency trees
skip-tree = []

[licenses]
# Use version 2 format (all licenses denied unless explicitly allowed)
version = 2

# Confidence threshold for license detection
confidence-threshold = 0.8

# Allowed licenses (all permissive licenses we accept)
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "CC-BY-3.0",
    "CC-BY-4.0",
    "MPL-2.0",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "Unlicense",
    "0BSD",
    "BlueOak-1.0.0",
    "CDLA-Permissive-2.0",
]

# License exceptions (if needed)
exceptions = []

[licenses.private]
# Ignore private licenses (false for compliance)
ignore = false

[sources]
# Unknown registries (deny - security risk)
unknown-registry = "deny"

# Unknown git sources (deny - security risk)
unknown-git = "deny"

# Allowed git sources. Empty by policy: every direct git dep must be
# added explicitly with a justification comment in this list. The
# registry URL (e.g. `rust-lang/crates.io-index`) is NOT a git source
# and must not appear here.
allow-git = []
