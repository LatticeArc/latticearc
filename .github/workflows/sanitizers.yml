# Sanitizers - Runtime Safety Checks
# Detects memory errors, data races, and undefined behavior at runtime
#
# Key RUSTFLAGS for sanitizer builds:
#   -C opt-level=1       : Keeps hash-based crypto (SLH-DSA) fast (~1s vs ~34min at opt=0)
#   -C debug-assertions=yes : Required because -Z build-std drops debug_assertions,
#                             which makes the FIPS integrity check abort instead of
#                             skipping in dev mode (the binary hash changes under ASAN)
#
# All ~2000 tests run under all 4 sanitizers. No tests are skipped.
#
# MSan cannot instrument C FFI code (aws-lc-rs), so modules that call into
# aws-lc-rs are excluded from MSan only (they run under ASAN/TSAN/LSAN).

name: Sanitizers

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly on Sunday at 4 AM UTC
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # AddressSanitizer - Detects memory errors
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-asan-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with AddressSanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=address -C opt-level=1 -C debug-assertions=yes" \
          cargo +nightly test --workspace --all-features \
            -Z build-std --target x86_64-unknown-linux-gnu \
            --lib -- --test-threads=1
        env:
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1:check_initialization_order=1
        timeout-minutes: 90

      - name: ASan Summary
        if: always()
        run: |
          echo "## AddressSanitizer Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "AddressSanitizer detects:" >> $GITHUB_STEP_SUMMARY
          echo "- Use-after-free" >> $GITHUB_STEP_SUMMARY
          echo "- Heap buffer overflow" >> $GITHUB_STEP_SUMMARY
          echo "- Stack buffer overflow" >> $GITHUB_STEP_SUMMARY
          echo "- Global buffer overflow" >> $GITHUB_STEP_SUMMARY
          echo "- Use-after-return" >> $GITHUB_STEP_SUMMARY
          echo "- Memory leaks" >> $GITHUB_STEP_SUMMARY

  # ThreadSanitizer - Detects data races
  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-tsan-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with ThreadSanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=thread -C opt-level=1 -C debug-assertions=yes" \
          cargo +nightly test --workspace --all-features \
            -Z build-std --target x86_64-unknown-linux-gnu \
            --lib -- --test-threads=1
        env:
          TSAN_OPTIONS: second_deadlock_stack=1:history_size=7
        timeout-minutes: 90

      - name: TSan Summary
        if: always()
        run: |
          echo "## ThreadSanitizer Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ThreadSanitizer detects:" >> $GITHUB_STEP_SUMMARY
          echo "- Data races" >> $GITHUB_STEP_SUMMARY
          echo "- Deadlocks" >> $GITHUB_STEP_SUMMARY
          echo "- Thread leaks" >> $GITHUB_STEP_SUMMARY

  # MemorySanitizer - Detects uninitialized memory reads
  # Note: MSan cannot instrument C FFI code. aws-lc-rs (used for AES-GCM,
  # ML-KEM, ECDH, HKDF) is a C library that MSan sees as a black box. Memory
  # allocated/initialized inside aws-lc-rs appears "uninitialized" to MSan.
  # We exclude ALL modules that call aws-lc-rs FFI: aead, kem, kdf, hybrid,
  # tls, and unified_api. Pure-Rust modules (hash, signatures, zkp) still run.
  msan:
    name: MemorySanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-msan-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with MemorySanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=memory -Zsanitizer-memory-track-origins -C opt-level=1 -C debug-assertions=yes" \
          cargo +nightly test --workspace --all-features \
            -Z build-std --target x86_64-unknown-linux-gnu \
            --lib -- --test-threads=1 \
            --skip primitives::aead::aes_gcm \
            --skip primitives::kem::ecdh \
            --skip primitives::kem::ml_kem \
            --skip primitives::kdf::hkdf \
            --skip hybrid::encrypt_hybrid \
            --skip hybrid::kem_hybrid \
            --skip tls:: \
            --skip unified_api:: \
            --skip self_test::tests::test_aes_256_gcm_kat \
            --skip self_test::tests::test_hkdf_sha256_kat \
            --skip self_test::tests::test_ml_kem \
            --skip self_test::tests::test_kat_aes \
            --skip self_test::tests::test_kat_hkdf \
            --skip self_test::tests::test_kat_ml_kem
        env:
          MSAN_OPTIONS: poison_in_dtor=1
        timeout-minutes: 90

      - name: MSan Summary
        if: always()
        run: |
          echo "## MemorySanitizer Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "MemorySanitizer detects:" >> $GITHUB_STEP_SUMMARY
          echo "- Use of uninitialized memory" >> $GITHUB_STEP_SUMMARY
          echo "- Origin tracking for uninitialized values" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Excluded: All aws-lc-rs FFI consumers (aead, kem, kdf, hybrid, tls, unified_api) — C FFI not instrumentable by MSan" >> $GITHUB_STEP_SUMMARY

  # LeakSanitizer - Detects memory leaks (standalone)
  lsan:
    name: LeakSanitizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
        with:
          toolchain: nightly
          components: rust-src

      - name: Cache Cargo registry
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-lsan-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with LeakSanitizer
        run: |
          RUSTFLAGS="-Z sanitizer=leak -C opt-level=1 -C debug-assertions=yes" \
          cargo +nightly test --workspace --all-features \
            -Z build-std --target x86_64-unknown-linux-gnu \
            --lib -- --test-threads=1
        env:
          LSAN_OPTIONS: report_objects=1
        timeout-minutes: 90

      - name: LSan Summary
        if: always()
        run: |
          echo "## LeakSanitizer Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "LeakSanitizer detects:" >> $GITHUB_STEP_SUMMARY
          echo "- Memory leaks" >> $GITHUB_STEP_SUMMARY
          echo "- Leaked allocations with stack traces" >> $GITHUB_STEP_SUMMARY

  # Summary job
  sanitizer-summary:
    name: Sanitizer Summary
    runs-on: ubuntu-latest
    needs: [asan, tsan, msan, lsan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "# Sanitizer Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Sanitizer | Purpose | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| AddressSanitizer | Memory errors | ${{ needs.asan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ThreadSanitizer | Data races | ${{ needs.tsan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MemorySanitizer | Uninitialized reads | ${{ needs.msan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LeakSanitizer | Memory leaks | ${{ needs.lsan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Notes" >> $GITHUB_STEP_SUMMARY
          echo "- All sanitizers use \`-C opt-level=1\` to keep hash-based crypto fast while preserving instrumentation" >> $GITHUB_STEP_SUMMARY
          echo "- **MSan only**: aws-lc-rs FFI consumers excluded (C code not instrumentable by MSan)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All tests run. No tests skipped (except MSan FFI exclusions)." >> $GITHUB_STEP_SUMMARY
