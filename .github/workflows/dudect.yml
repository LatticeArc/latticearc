# DudeCT Constant-Time Validation
#
# Runs the DudeCT statistical constant-time harness
# (`tests/examples/dudect_ct.rs`) and fails the job if any benchmark
# produces `|max t| >` its per-bench threshold. DudeCT measures runtime
# for two input classes (e.g., valid vs. tampered HMAC tags), runs
# Welch's t-test, and reports the largest t-statistic observed. Values
# above ~5 are strong evidence that execution time depends on secret
# data — i.e., a timing side-channel.
#
# Per-bench thresholds (see `bench_threshold` function in the gate step):
#
#   bench_verify_hmac_sha256 → 10.0  (PRIMARY CT gate)
#     Touches aws-lc-rs FFI which ctgrind cannot cleanly reason about,
#     so dudect is the only CT check for this path. The `HmacSha256Verifier`
#     (commit ee152a08) eliminated per-call FFI allocation; local max |t|
#     stays around 2-3 across many runs, so 10.0 gives comfortable margin.
#
#   bench_hybrid_secret_key_ct_eq → 50.0  (REGRESSION SENTRY)
#     Instruction-level CT is already established authoritatively by
#     ctgrind.yml (Valgrind-memcheck run 24689159235 confirmed no
#     secret-dependent branch/index in the pure-Rust ct_eq path). The
#     remaining dudect job here is to notice if a future refactor
#     reintroduces a byte-wise short-circuit — such a regression would
#     produce |t| in the hundreds, well above 50. Shared-runner variance
#     has been observed up to |t| ≈ 33 on this known-CT code path; 50
#     is ~1.5× headroom over that empirical ceiling.
#
# This workflow is *not* PR-blocking. Runs weekly + on-demand.
#
# Companions:
#   - `.github/workflows/ctgrind.yml`       — instruction-level CT oracle
#                                             (authoritative for pure-Rust paths)
#   - `.github/workflows/constant-time.yml` — Criterion-based qualitative
#                                             timing benchmarks

name: DudeCT Constant-Time Gate

on:
  schedule:
    # Weekly, Mondays 06:00 UTC — offset from constant-time.yml (Sun 05:00)
    # so the two side-channel workflows don't share a runner slot.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  dudect:
    name: DudeCT Harness
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-dudect-${{ hashFiles('**/Cargo.lock') }}

      - name: Build dudect harness (release)
        run: cargo build --release --example dudect_ct -p latticearc-tests

      - name: Run dudect harness
        run: |
          # Run the harness and capture output. Don't use `tee` — we need
          # the raw stdout for the parser; a structured summary goes to
          # the step summary separately.
          ./target/release/examples/dudect_ct 2>&1 | tee dudect-output.txt

      - name: Enforce per-bench t-statistic thresholds
        shell: bash
        run: |
          set -euo pipefail

          # Per-bench threshold lookup. See the header comment in this file
          # for the rationale behind each value. A `bench foo` line whose
          # name isn't in the table defaults to the strict 10.0 floor —
          # new benches must explicitly opt into a looser threshold here
          # with a documented reason.
          bench_threshold() {
            case "$1" in
              bench_verify_hmac_sha256)      echo "10.0" ;;
              bench_hybrid_secret_key_ct_eq) echo "50.0" ;;
              *)                             echo "10.0" ;;
            esac
          }

          # Sample line format:
          #   bench foo ... : n == +0.062M, max t = -1.62738, max tau = ...
          if ! grep -q "max t =" dudect-output.txt; then
            echo "::error::No 'max t =' lines in dudect output — harness did not run"
            cat dudect-output.txt
            exit 1
          fi

          fail=0
          summary_lines=()
          while IFS= read -r line; do
            name="$(echo "$line" | sed -nE 's/^bench ([^ ]+).*$/\1/p')"
            t_raw="$(echo "$line" | sed -nE 's/.*max t = ([+-][0-9.]+).*/\1/p')"
            t_abs="$(echo "$t_raw" | sed 's/^[+-]//')"
            th="$(bench_threshold "$name")"

            over="$(awk -v t="$t_abs" -v th="$th" 'BEGIN { print (t > th) ? 1 : 0 }')"
            if [ "$over" = "1" ]; then
              echo "::error::bench $name: |max t| = $t_abs exceeds threshold $th"
              summary_lines+=("- ❌ \`$name\`: |max t| = $t_abs (threshold $th)")
              fail=1
            else
              echo "OK  bench $name: |max t| = $t_abs (threshold $th)"
              summary_lines+=("- ✅ \`$name\`: |max t| = $t_abs (threshold $th)")
            fi
          done < <(grep "max t =" dudect-output.txt)

          {
            echo "## DudeCT Constant-Time Gate"
            echo ""
            echo "Per-bench thresholds (rationale in \`dudect.yml\` header):"
            echo ""
            for l in "${summary_lines[@]}"; do echo "$l"; done
            echo ""
            echo '```'
            grep "max t =" dudect-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fail" = "1" ]; then
            echo "::error::DudeCT gate failed — see per-bench errors above"
            exit 1
          fi

      - name: Upload raw harness output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dudect-output
          path: dudect-output.txt
          retention-days: 30
