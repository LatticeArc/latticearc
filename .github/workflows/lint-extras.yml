# Lint extras — CI grep rules that catch context-specific anti-patterns
# clippy can't express.
#
# Round-19 audit takeaway: 18 of 24 findings were patterns that mechanical
# rules at PR-time would catch. clippy.toml covers what it can; this file
# covers the rest. Each rule below corresponds to a concrete audit finding
# (cited inline) and to a `MUST USE / NEVER USE` entry in
# `docs/MODULE_PATTERNS.md`.
#
# Rule of thumb when adding a check: keep it cheap (ripgrep, single-pass)
# and produce a clear error pointing at the canonical alternative.

name: Lint Extras

on:
  pull_request:
    paths:
      - '**.rs'
      - '**.md'
      - '**.yml'
      - '**.toml'
      - '.github/workflows/lint-extras.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-extras-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbidden-patterns:
    name: Forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: M5 — no `echo $PASS` in docs/code (use `read -rs` instead)
        run: |
          set -e
          # `echo $PASS` writes the password to .bash_history. The canonical
          # pattern is `read -rs PASS && printf '%s' "$PASS" | …`.
          # Excluded: this CI file (it documents the rule).
          if rg --type-add 'docs:*.{md,rst,txt}' --type rust --type yaml --type docs \
              -n 'echo \$PASS' \
              --glob '!.github/workflows/lint-extras.yml'; then
            echo "::error::Found 'echo \$PASS' — use 'read -rs PASS && printf' instead. See docs/MODULE_PATTERNS.md (latticearc-cli::commands)."
            exit 1
          fi

      - name: M6 — no `expose_secret().to_vec()` (escapes Zeroizing)
        run: |
          set -e
          # Round-19 M6: `.expose_secret().to_vec()` clones secret bytes into
          # a Vec<u8> that is not zeroized on drop. Either borrow via
          # `as_slice()` or wrap the clone in `Zeroizing::new(...)` immediately.
          if rg --type rust -n '\.expose_secret\(\)\.to_vec\(\)' \
              --glob '!latticearc/tests/**'; then
            echo "::error::expose_secret().to_vec() escapes Zeroizing. Borrow with as_slice() or wrap with Zeroizing::new(). See docs/MODULE_PATTERNS.md (primitives::security)."
            exit 1
          fi

      - name: M3 — audit.rs OpenOptions::open must set .mode(0o600) on Unix
        run: |
          set -e
          # Round-19 M3: audit log files must be 0o600 on Unix. The bare
          # `OpenOptions::new()...open()` path inherits umask, often
          # world-readable.
          #
          # Algorithm: stream audit.rs line-by-line, maintain a 3-line
          # backward window, and for every line containing `.open(`:
          #   - PASS if the line itself contains `.mode(0o600)`.
          #   - PASS if any of the previous 3 lines contains
          #     `// LINT-OK:` (covers `cfg-not-unix` and similar).
          #   - PASS if the line is a comment (`^\s*//`) — comments
          #     showing example call shapes are not real call sites.
          #   - FAIL otherwise.
          if ! awk -v file=latticearc/src/unified_api/audit.rs '
            BEGIN { fail = 0 }
            { lines[NR] = $0 }
            /^[ \t]*\/\// { next }
            /\.open\(/ {
                if ($0 ~ /\.mode\(0o600\)/) next
                ok = 0
                for (i = 1; i <= 3; i++) {
                    if (lines[NR-i] ~ /\/\/ LINT-OK:/) { ok = 1; break }
                }
                if (ok == 0) {
                    print file ":" NR ": " $0 > "/dev/stderr"
                    fail = 1
                }
            }
            END { exit fail }
          ' latticearc/src/unified_api/audit.rs; then
            echo "::error::audit.rs OpenOptions::open without .mode(0o600). Add .mode(0o600) on Unix or tag with '// LINT-OK: cfg-not-unix' on (or above) the cfg(not(unix)) branch. See docs/MODULE_PATTERNS.md (unified_api::audit)."
            exit 1
          fi

      - name: H3 — audit.rs raw metadata.insert outside with_metadata is forbidden
        run: |
          set -e
          # Round-19 H3: AuditEventBuilder::metadata bypassed the caps that
          # AuditEvent::with_metadata enforces. All metadata writes must go
          # through `with_metadata` or `compute_integrity_hash` reads.
          #
          # The canonical `self.metadata.insert(...)` inside
          # `pub fn with_metadata(...)` itself is the implementation of the
          # helper — exempt by `// LINT-OK: canonical-with-metadata-impl`
          # tagged on the same line.
          set +e
          OFFENDERS=$(rg -n 'event\.metadata\.insert\(|self\.event\.metadata\.insert\(|self\.metadata\.insert\(' \
              latticearc/src/unified_api/audit.rs \
              | rg -v '// LINT-OK: canonical-with-metadata-impl' || true)
          set -e
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Raw metadata.insert outside the canonical with_metadata impl. Use AuditEvent::with_metadata or builder.metadata. See docs/MODULE_PATTERNS.md (unified_api::audit)."
            echo "$OFFENDERS"
            exit 1
          fi

      - name: H1/H2 — CLI must size-gate file reads
        run: |
          set -e
          # Round-19 H1: signature path skipped enforce_input_size_limit.
          # Round-20 audit fix #10/#14:
          #   (a) promoted from `::warning::` to `exit 1` — the regression
          #       class this rule prevents is HIGH-severity, downgrading
          #       to a warning meant the rule couldn't actually enforce.
          #   (b) expanded scope from `latticearc-cli/src/commands/` to
          #       all of `latticearc-cli/src/` — round-20 #14 caught
          #       `keyfile.rs` (which lives at the crate root, not
          #       under commands/) doing an ungated `std::fs::read`.
          # Allowlist sites are tagged with `// LINT-OK: size-gated-by-…`
          # so a reviewer can see exactly which gate is in effect.
          OFFENDERS=$(rg -n 'std::fs::read(_to_string)?\(' \
              latticearc-cli/src/ \
              --glob '!**/tests/**' || true)
          if [ -n "$OFFENDERS" ]; then
            # Allowlist:
            #   - commands/common.rs hosts `read_file_or_stdin` /
            #     `read_string_or_stdin` — they call `std::fs::read`
            #     internally AFTER calling `enforce_input_size_limit`.
            #   - Lines tagged `// LINT-OK: size-gated-…` opt out
            #     individually (use sparingly; the tag must explain
            #     which gate replaces enforce_input_size_limit).
            FILTERED=$(echo "$OFFENDERS" \
                | rg -v 'commands/common\.rs' \
                | rg -v '// LINT-OK: size-gated-' || true)
            # The keyfile.rs path adds its own MAX_KEYFILE_BYTES gate
            # before std::fs::read; allow it via the inline LINT-OK tag.
            if [ -n "$FILTERED" ]; then
              echo "::error::CLI code uses std::fs::read without enforce_input_size_limit. Either route through common::read_file_or_stdin OR add a local size guard and tag the line with '// LINT-OK: size-gated-by-<MAX_CONST>'. See docs/MODULE_PATTERNS.md (latticearc-cli::commands)."
              echo "$FILTERED"
              exit 1
            fi
          fi

      - name: M3-secret-mode — AtomicWrite of secret material must use .secret_mode()
        run: |
          set -e
          # Round-20 audit fix #5: decrypt.rs writes plaintext via
          # AtomicWrite without .secret_mode(), inheriting umask 0o644.
          # MODULE_PATTERNS.md mandates secret_mode() for files holding
          # secret material. The lint suite (round-19 Step-2) shipped
          # the doc but no CI rule.
          #
          # Heuristic: every AtomicWrite::new(...).write(...) call in CLI
          # code that handles decrypted plaintext or key material must be
          # paired with .secret_mode() somewhere in the chain. Allowlist
          # via `// LINT-OK: public-write-…` for files that are
          # legitimately public (e.g. PK files written without secret
          # mode).
          set +e
          # Find AtomicWrite chains that DON'T contain `.secret_mode(`.
          # Use awk for multi-line awareness: collect each chain from
          # `AtomicWrite::new` to the next `.write(` and check. Also
          # look at the immediately-preceding line for a LINT-OK
          # public-write tag (common pattern: tag the call site with a
          # comment on the line above for human readability).
          OFFENDERS=$(awk '
            BEGIN { in_chain = 0; chain = ""; line_no = 0; prev_line = "" }
            /AtomicWrite::new\(/ { in_chain = 1; chain = prev_line " " $0; line_no = NR; prev_line = $0; next }
            in_chain {
                chain = chain " " $0
                if (/\.write\(/) {
                    if (chain !~ /\.secret_mode\(/ && chain !~ /\/\/ LINT-OK: public-write-/) {
                        print FILENAME ":" line_no ": " chain
                    }
                    in_chain = 0
                    chain = ""
                }
            }
            { prev_line = $0 }
          ' $(find latticearc-cli/src -name '*.rs' -not -path '*/tests/*'))
          set -e
          if [ -n "$OFFENDERS" ]; then
            echo "::error::AtomicWrite of secret material must use .secret_mode(). Add .secret_mode() to the chain, or — if the file is legitimately public (e.g. .pub.json key files) — tag with '// LINT-OK: public-write-<reason>' on the AtomicWrite::new line. See docs/MODULE_PATTERNS.md (atomic_write)."
            echo "$OFFENDERS"
            exit 1
          fi

      - name: status-check-coverage — every CI job must appear in status-check.needs
        run: |
          set -e
          # Round-20 audit fix #9: round-19 added `default-debug-parity`
          # job specifically to catch H4-class regressions, but forgot to
          # include it in `status-check.needs:`, so its failure didn't
          # block merge. Generalize: every job defined under `jobs:` in
          # ci.yml must appear in `status-check.needs:`.
          CI_YML=".github/workflows/ci.yml"
          # Extract job names: lines matching `^  [a-z][a-z0-9-]*:` at
          # exactly two-space indent are top-level jobs (excluding
          # `concurrency:`, `permissions:`, `defaults:`, etc. inside
          # workflow scope — but those don't match the `jobs:` indent
          # pattern below, so the heuristic is fine).
          ALL_JOBS=$(awk '/^jobs:/{in_jobs=1; next} in_jobs && /^  [a-z][a-z0-9_-]*:$/ {print $1}' "$CI_YML" | tr -d ':' | sort -u)
          # status-check itself is the gate, exclude it.
          ALL_JOBS=$(echo "$ALL_JOBS" | grep -v '^status-check$' || true)
          # Pull the `needs:` list from the status-check job.
          NEEDS=$(awk '
            /^  status-check:/ { in_sc = 1; next }
            in_sc && /needs:/ {
                gsub(/.*needs:[ ]*\[/, "")
                gsub(/\].*/, "")
                gsub(/[ ,]+/, "\n")
                print
                exit
            }
          ' "$CI_YML" | sort -u)
          MISSING=""
          while IFS= read -r job; do
            [ -z "$job" ] && continue
            if ! echo "$NEEDS" | grep -qx "$job"; then
                MISSING="$MISSING $job"
            fi
          done <<< "$ALL_JOBS"
          if [ -n "$MISSING" ]; then
            echo "::error::CI jobs not in status-check.needs: $MISSING"
            echo "Every job in .github/workflows/ci.yml must appear in the status-check needs list, otherwise its failure does not block merge. See docs/MODULE_PATTERNS.md (Workflow conventions)."
            exit 1
          fi

      - name: M9 — establish path must call verify_challenge_age
        run: |
          set -e
          # Round-19 M9: VerifiedSession::establish skipped verify_challenge_age.
          # Whenever generate_proof or verify_response is called from establish,
          # the immediately preceding lines must call verify_challenge_age.
          # Heuristic: search for `establish` blocks lacking the helper.
          if rg -n -B 5 'verify_response' latticearc/src/unified_api/zero_trust.rs \
              | rg -B 5 'fn establish' >/dev/null 2>&1; then
            # Establish exists; ensure verify_challenge_age is called within it.
            if ! rg -n -A 30 'fn establish\(' latticearc/src/unified_api/zero_trust.rs \
                | rg 'verify_challenge_age' >/dev/null; then
              echo "::error::VerifiedSession::establish must call verify_challenge_age before verify_response. See docs/MODULE_PATTERNS.md (unified_api::zero_trust)."
              exit 1
            fi
          fi

      - name: D1 — README SHA-2 row must not claim aws-lc-rs
        run: |
          set -e
          # Round-19 D1: README claimed SHA-2 routes through aws-lc-rs under
          # --features fips, but primitives/hash/sha2.rs uses the RustCrypto
          # `sha2` crate. The grep below catches future regressions.
          if rg -n '\| \*\*Hash\*\* \| SHA-2.*aws-lc-rs.*FIPS 140-3' README.md; then
            echo "::error::README SHA-2 row falsely claims aws-lc-rs FIPS validation. SHA-2 routes through RustCrypto sha2 crate; --features fips does NOT swap it."
            exit 1
          fi
