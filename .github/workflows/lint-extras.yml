# Lint extras — CI grep rules that catch context-specific anti-patterns
# clippy can't express.
#
# Round-19 audit takeaway: 18 of 24 findings were patterns that mechanical
# rules at PR-time would catch. clippy.toml covers what it can; this file
# covers the rest. Each rule below corresponds to a concrete audit finding
# (cited inline) and to a `MUST USE / NEVER USE` entry in
# `docs/MODULE_PATTERNS.md`.
#
# Rule of thumb when adding a check: keep it cheap (ripgrep, single-pass)
# and produce a clear error pointing at the canonical alternative.

name: Lint Extras

on:
  pull_request:
    paths:
      - '**.rs'
      - '**.md'
      - '**.yml'
      - '**.toml'
      - '.github/workflows/lint-extras.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: lint-extras-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  forbidden-patterns:
    name: Forbidden patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ripgrep
        run: sudo apt-get update -qq && sudo apt-get install -y ripgrep

      - name: M5 — no `echo $PASS` in docs/code (use `read -rs` instead)
        run: |
          set -e
          # `echo $PASS` writes the password to .bash_history. The canonical
          # pattern is `read -rs PASS && printf '%s' "$PASS" | …`.
          # Excluded: this CI file (it documents the rule).
          if rg --type-add 'docs:*.{md,rst,txt}' --type rust --type yaml --type docs \
              -n 'echo \$PASS' \
              --glob '!.github/workflows/lint-extras.yml'; then
            echo "::error::Found 'echo \$PASS' — use 'read -rs PASS && printf' instead. See docs/MODULE_PATTERNS.md (latticearc-cli::commands)."
            exit 1
          fi

      - name: M6 — no `expose_secret().to_vec()` (escapes Zeroizing)
        run: |
          set -e
          # Round-19 M6: `.expose_secret().to_vec()` clones secret bytes into
          # a Vec<u8> that is not zeroized on drop. Either borrow via
          # `as_slice()` or wrap the clone in `Zeroizing::new(...)` immediately.
          if rg --type rust -n '\.expose_secret\(\)\.to_vec\(\)' \
              --glob '!latticearc/tests/**'; then
            echo "::error::expose_secret().to_vec() escapes Zeroizing. Borrow with as_slice() or wrap with Zeroizing::new(). See docs/MODULE_PATTERNS.md (primitives::security)."
            exit 1
          fi

      - name: M3 — audit.rs OpenOptions::open must set .mode(0o600) on Unix
        run: |
          set -e
          # Round-19 M3: audit log files must be 0o600 on Unix. The bare
          # `OpenOptions::new()...open()` path inherits umask, often
          # world-readable.
          #
          # Algorithm: stream audit.rs line-by-line, maintain a 3-line
          # backward window, and for every line containing `.open(`:
          #   - PASS if the line itself contains `.mode(0o600)`.
          #   - PASS if any of the previous 3 lines contains
          #     `// LINT-OK:` (covers `cfg-not-unix` and similar).
          #   - PASS if the line is a comment (`^\s*//`) — comments
          #     showing example call shapes are not real call sites.
          #   - FAIL otherwise.
          if ! awk -v file=latticearc/src/unified_api/audit.rs '
            BEGIN { fail = 0 }
            { lines[NR] = $0 }
            /^[ \t]*\/\// { next }
            /\.open\(/ {
                if ($0 ~ /\.mode\(0o600\)/) next
                ok = 0
                for (i = 1; i <= 3; i++) {
                    if (lines[NR-i] ~ /\/\/ LINT-OK:/) { ok = 1; break }
                }
                if (ok == 0) {
                    print file ":" NR ": " $0 > "/dev/stderr"
                    fail = 1
                }
            }
            END { exit fail }
          ' latticearc/src/unified_api/audit.rs; then
            echo "::error::audit.rs OpenOptions::open without .mode(0o600). Add .mode(0o600) on Unix or tag with '// LINT-OK: cfg-not-unix' on (or above) the cfg(not(unix)) branch. See docs/MODULE_PATTERNS.md (unified_api::audit)."
            exit 1
          fi

      - name: H3 — audit.rs raw metadata.insert outside with_metadata is forbidden
        run: |
          set -e
          # Round-19 H3: AuditEventBuilder::metadata bypassed the caps that
          # AuditEvent::with_metadata enforces. All metadata writes must go
          # through `with_metadata` or `compute_integrity_hash` reads.
          #
          # The canonical `self.metadata.insert(...)` inside
          # `pub fn with_metadata(...)` itself is the implementation of the
          # helper — exempt by `// LINT-OK: canonical-with-metadata-impl`
          # tagged on the same line.
          set +e
          OFFENDERS=$(rg -n 'event\.metadata\.insert\(|self\.event\.metadata\.insert\(|self\.metadata\.insert\(' \
              latticearc/src/unified_api/audit.rs \
              | rg -v '// LINT-OK: canonical-with-metadata-impl' || true)
          set -e
          if [ -n "$OFFENDERS" ]; then
            echo "::error::Raw metadata.insert outside the canonical with_metadata impl. Use AuditEvent::with_metadata or builder.metadata. See docs/MODULE_PATTERNS.md (unified_api::audit)."
            echo "$OFFENDERS"
            exit 1
          fi

      - name: H1/H2 — CLI must size-gate file reads
        run: |
          set -e
          # Round-19 H1: signature path skipped enforce_input_size_limit.
          # Round-20 audit fix #10/#14:
          #   (a) promoted from `::warning::` to `exit 1` — the regression
          #       class this rule prevents is HIGH-severity, downgrading
          #       to a warning meant the rule couldn't actually enforce.
          #   (b) expanded scope from `latticearc-cli/src/commands/` to
          #       all of `latticearc-cli/src/` — round-20 #14 caught
          #       `keyfile.rs` (which lives at the crate root, not
          #       under commands/) doing an ungated `std::fs::read`.
          # Allowlist sites are tagged with `// LINT-OK: size-gated-by-…`
          # so a reviewer can see exactly which gate is in effect.
          OFFENDERS=$(rg -n 'std::fs::read(_to_string)?\(' \
              latticearc-cli/src/ \
              --glob '!**/tests/**' || true)
          if [ -n "$OFFENDERS" ]; then
            # Allowlist:
            #   - commands/common.rs hosts `read_file_or_stdin` /
            #     `read_string_or_stdin` — they call `std::fs::read`
            #     internally AFTER calling `enforce_input_size_limit`.
            #   - Lines tagged `// LINT-OK: size-gated-…` opt out
            #     individually (use sparingly; the tag must explain
            #     which gate replaces enforce_input_size_limit).
            FILTERED=$(echo "$OFFENDERS" \
                | rg -v 'commands/common\.rs' \
                | rg -v '// LINT-OK: size-gated-' || true)
            # The keyfile.rs path adds its own MAX_KEYFILE_BYTES gate
            # before std::fs::read; allow it via the inline LINT-OK tag.
            if [ -n "$FILTERED" ]; then
              echo "::error::CLI code uses std::fs::read without enforce_input_size_limit. Either route through common::read_file_or_stdin OR add a local size guard and tag the line with '// LINT-OK: size-gated-by-<MAX_CONST>'. See docs/MODULE_PATTERNS.md (latticearc-cli::commands)."
              echo "$FILTERED"
              exit 1
            fi
          fi

      - name: M3-secret-mode — AtomicWrite of secret material must use .secret_mode()
        run: |
          set -e
          # Round-20 audit fix #5: decrypt.rs writes plaintext via
          # AtomicWrite without .secret_mode(), inheriting umask 0o644.
          # MODULE_PATTERNS.md mandates secret_mode() for files holding
          # secret material. The lint suite (round-19 Step-2) shipped
          # the doc but no CI rule.
          #
          # Heuristic: every AtomicWrite::new(...).write(...) call in CLI
          # code that handles decrypted plaintext or key material must be
          # paired with .secret_mode() somewhere in the chain. Allowlist
          # via `// LINT-OK: public-write-…` for files that are
          # legitimately public (e.g. PK files written without secret
          # mode).
          set +e
          # Find AtomicWrite chains that DON'T contain `.secret_mode(`.
          # Use awk for multi-line awareness: collect each chain from
          # `AtomicWrite::new` to the next `.write(` and check. Also
          # look at the immediately-preceding line for a LINT-OK
          # public-write tag (common pattern: tag the call site with a
          # comment on the line above for human readability).
          OFFENDERS=$(awk '
            BEGIN { in_chain = 0; chain = ""; line_no = 0; prev_line = "" }
            /AtomicWrite::new\(/ { in_chain = 1; chain = prev_line " " $0; line_no = NR; prev_line = $0; next }
            in_chain {
                chain = chain " " $0
                if (/\.write\(/) {
                    if (chain !~ /\.secret_mode\(/ && chain !~ /\/\/ LINT-OK: public-write-/) {
                        print FILENAME ":" line_no ": " chain
                    }
                    in_chain = 0
                    chain = ""
                }
            }
            { prev_line = $0 }
          ' $(find latticearc-cli/src -name '*.rs' -not -path '*/tests/*'))
          set -e
          if [ -n "$OFFENDERS" ]; then
            echo "::error::AtomicWrite of secret material must use .secret_mode(). Add .secret_mode() to the chain, or — if the file is legitimately public (e.g. .pub.json key files) — tag with '// LINT-OK: public-write-<reason>' on the AtomicWrite::new line. See docs/MODULE_PATTERNS.md (atomic_write)."
            echo "$OFFENDERS"
            exit 1
          fi

      - name: status-check-coverage — every CI job must appear in status-check.needs
        run: |
          set -e
          # Round-20 audit fix #9: round-19 added `default-debug-parity`
          # job specifically to catch H4-class regressions, but forgot to
          # include it in `status-check.needs:`, so its failure didn't
          # block merge. Generalize: every job defined under `jobs:` in
          # ci.yml must appear in `status-check.needs:`.
          #
          # Round-21 audit fix #4: the previous version of this rule had
          # a false positive on `changes`, `docs-deploy`, and
          # `release-validation` — three jobs intentionally NOT gated by
          # status-check (changes is a path filter, docs-deploy publishes
          # only on release, release-validation runs only on tag). We
          # honor `# LINT-OK: not-in-status-check` comments above the
          # `jobs:` entry to whitelist intentional-skip jobs.
          CI_YML=".github/workflows/ci.yml"
          # Extract every two-space-indented job name UNDER the `jobs:`
          # block (not the `on:` block — `pull_request`, `push`, etc.
          # also match `^  X:$` and would false-positive). To find
          # LINT-OK exemptions we look at the line BEFORE each job
          # definition.
          ALL_JOBS=$(awk '
            /^jobs:/ { in_jobs = 1; next }
            /^[a-zA-Z]/ { in_jobs = 0 }
            in_jobs && /^  [a-z][a-z0-9_-]*:$/ {
                if (prev !~ /# LINT-OK: not-in-status-check/) {
                    j = $1; sub(/:$/, "", j); print j
                }
            }
            { prev = $0 }
          ' "$CI_YML" | sort -u)
          # status-check itself is the gate, always exclude.
          ALL_JOBS=$(echo "$ALL_JOBS" | grep -v '^status-check$' || true)
          # Pull the `needs:` list from the status-check job.
          NEEDS=$(awk '
            /^  status-check:/ { in_sc = 1; next }
            in_sc && /needs:/ {
                gsub(/.*needs:[ ]*\[/, "")
                gsub(/\].*/, "")
                gsub(/[ ,]+/, "\n")
                print
                exit
            }
          ' "$CI_YML" | sort -u)
          MISSING=""
          while IFS= read -r job; do
            [ -z "$job" ] && continue
            if ! echo "$NEEDS" | grep -qx "$job"; then
                MISSING="$MISSING $job"
            fi
          done <<< "$ALL_JOBS"
          if [ -n "$MISSING" ]; then
            echo "::error::CI jobs not in status-check.needs: $MISSING"
            echo "Every job in .github/workflows/ci.yml must appear in the status-check needs list (so its failure blocks merge), OR be explicitly opted out with '# LINT-OK: not-in-status-check' on the line directly above the job definition. See docs/MODULE_PATTERNS.md (Workflow conventions)."
            exit 1
          fi

      - name: status-check-result-coverage — every needs[] entry must have inner result-check
        run: |
          set -e
          # Round-21 audit fix #18: round-20 added `default-debug-parity`
          # to `needs:` AND to the inner result-check loop, but
          # `kat-integrity` had been in `needs:` since earlier rounds
          # without a corresponding inner check. The old lint rule only
          # validated needs:; the inner result-check block was a
          # separate, unenforced layer. New rule below cross-checks.
          #
          # The status-check job uses two layers:
          #   1. `needs: [a, b, c, ...]`              — defines the wait list
          #   2. `[[ "${{ needs.X.result }}" == "failure" ]]` — translates
          #      a failed dependency into a failed gate
          # Both are required for a job's failure to actually block merge.
          # `fuzz-nightly` and `fuzz-weekly` are intentionally
          # warning-only (round-12 H-5 rationale) and use `if [[ ...
          # failure ]]; then echo Warning` instead — exempted by
          # presence of "Warning" in the same line.
          CI_YML=".github/workflows/ci.yml"
          NEEDS=$(awk '
            /^  status-check:/ { in_sc = 1; next }
            in_sc && /needs:/ {
                gsub(/.*needs:[ ]*\[/, "")
                gsub(/\].*/, "")
                gsub(/[ ,]+/, "\n")
                print
                exit
            }
          ' "$CI_YML" | sort -u)
          # Extract every job name referenced inside any
          # `needs.<name>.result` expression in the status-check body.
          RESULT_CHECKED=$(awk '
            /^  status-check:/ { in_sc = 1 }
            in_sc {
                while (match($0, /needs\.[a-zA-Z0-9_-]+\.result/)) {
                    s = substr($0, RSTART+6, RLENGTH-13)
                    print s
                    $0 = substr($0, RSTART+RLENGTH)
                }
            }
          ' "$CI_YML" | sort -u)
          MISSING=""
          while IFS= read -r job; do
            [ -z "$job" ] && continue
            if ! echo "$RESULT_CHECKED" | grep -qx "$job"; then
                MISSING="$MISSING $job"
            fi
          done <<< "$NEEDS"
          if [ -n "$MISSING" ]; then
            echo "::error::needs[] entries with no inner result-check (failure does not block merge): $MISSING"
            echo "Each entry in status-check.needs[] must have a matching '[[ \"\${{ needs.X.result }}\" == \"failure\" ]]' line in the same job body, OR the corresponding 'echo Warning' / 'non-blocking' branch (fuzz-nightly / fuzz-weekly pattern). Round-19 H4 + round-21 #18."
            exit 1
          fi

      - name: fuzz-matrix-coverage — every fuzz_targets/*.rs binary must appear in fuzz-weekly matrix
        run: |
          set -e
          # Round-21 audit fix #2: 3 of 31 fuzz targets declared in
          # fuzz/Cargo.toml were absent from the fuzz-weekly matrix.
          # Round-15 fixed the inverse (matrix entries with no binary).
          # This rule closes the gap in both directions: every binary
          # in `[[bin]]` blocks of fuzz/Cargo.toml must appear in the
          # fuzz-weekly target list, and every matrix entry must
          # correspond to a real binary.
          BINS=$(awk '
            /^\[\[bin\]\]/ { in_bin = 1; next }
            in_bin && /^name = "/ {
                gsub(/.*name = "/, ""); gsub(/".*/, "")
                print
                in_bin = 0
            }
          ' fuzz/Cargo.toml | sort -u)
          MATRIX=$(awk '
            /^  fuzz-weekly:/ { in_w = 1; next }
            in_w && /^[a-zA-Z]/ { in_w = 0 }
            in_w && /fuzz-target:/ { in_t = 1; next }
            in_t && /^[ ]+- / {
                gsub(/^[ ]+- /, "")
                gsub(/[ \t]/, "")
                print
            }
            in_t && /^[ ]+steps:/ { in_t = 0 }
          ' .github/workflows/ci.yml | sort -u)
          MISSING_FROM_MATRIX=""
          while IFS= read -r bin; do
            [ -z "$bin" ] && continue
            if ! echo "$MATRIX" | grep -qx "$bin"; then
                MISSING_FROM_MATRIX="$MISSING_FROM_MATRIX $bin"
            fi
          done <<< "$BINS"
          MISSING_BINS=""
          while IFS= read -r m; do
            [ -z "$m" ] && continue
            if ! echo "$BINS" | grep -qx "$m"; then
                MISSING_BINS="$MISSING_BINS $m"
            fi
          done <<< "$MATRIX"
          if [ -n "$MISSING_FROM_MATRIX" ]; then
            echo "::error::fuzz binaries declared in fuzz/Cargo.toml but missing from ci.yml fuzz-weekly matrix:$MISSING_FROM_MATRIX"
            echo "Add the missing entries to .github/workflows/ci.yml fuzz-weekly.matrix.fuzz-target. Round-21 audit fix #2."
            exit 1
          fi
          if [ -n "$MISSING_BINS" ]; then
            echo "::error::fuzz-weekly matrix entries with no matching [[bin]] in fuzz/Cargo.toml:$MISSING_BINS"
            echo "These targets will fail at runtime. Round-15 reversal."
            exit 1
          fi

      - name: fips-policy-version — FIPS_SECURITY_POLICY.md Module Version must match workspace
        run: |
          set -e
          # Round-21 audit fix #13: FIPS policy doc lagged the workspace
          # version by two majors (0.6.0 vs 0.8.0). The same drift class
          # as round-19 D1 (README claim vs implementation). The
          # security policy doc is shown to FIPS submission reviewers;
          # a stale version is a credibility failure.
          WORKSPACE_VER=$(awk '/^\[workspace\.package\]/{in_w=1; next} in_w && /^version[ ]*=/{ split($0, a, /"/); print a[2]; exit}' Cargo.toml)
          POLICY_VER=$(grep -E '^\*\*Module Version\*\*:' docs/FIPS_SECURITY_POLICY.md | head -1 | sed -E 's/.*: //')
          POLICY_TABLE_VER=$(grep -E '^\| Module Version \|' docs/FIPS_SECURITY_POLICY.md | head -1 | awk -F'|' '{gsub(/[ \t]/, "", $3); print $3}')
          if [ "$WORKSPACE_VER" != "$POLICY_VER" ] || [ "$WORKSPACE_VER" != "$POLICY_TABLE_VER" ]; then
            echo "::error::FIPS_SECURITY_POLICY.md Module Version is stale."
            echo "  Cargo.toml workspace.package.version: $WORKSPACE_VER"
            echo "  docs/FIPS_SECURITY_POLICY.md header:    $POLICY_VER"
            echo "  docs/FIPS_SECURITY_POLICY.md table row: $POLICY_TABLE_VER"
            echo "Update both sites in docs/FIPS_SECURITY_POLICY.md to match the workspace version. Round-21 audit fix #13."
            exit 1
          fi

      - name: TRACKING-staleness — Open rows must reference state that's still true
        run: |
          set -e
          # Round-21 audit fix #17: TRK-005 said wildcards="warn" → "deny"
          # was open work, but round-20 already promoted it. The Open
          # table accumulates stale rows because nothing checks whether
          # the stated condition still holds.
          #
          # This rule is a structural cross-check: for each row in the
          # Open table that mentions a specific configuration claim
          # (e.g. `wildcards = "warn"`), verify that claim is still true
          # in the cited file. Specifically:
          #   - if the row mentions `wildcards = "warn"` and deny.toml
          #     actually has `wildcards = "deny"`, the row is stale.
          #   - if the row mentions `continue-on-error: true` and the
          #     cited workflow has `continue-on-error: false`, stale.
          #
          # Both are heuristics — false positives possible if the row's
          # text quotes a condition without claiming it currently holds.
          # In practice the rows are short and the simple substring
          # check is reliable enough.
          STALE=""
          if grep -qE '^\| TRK-' docs/TRACKING.md; then
              # Rule 1: any open TRK row mentioning wildcards = "warn"
              # while deny.toml has "deny".
              if grep -A0 '^| TRK-' docs/TRACKING.md | grep -q 'wildcards = "warn"'; then
                  if grep -q '^wildcards = "deny"' deny.toml; then
                      STALE="$STALE TRK-row-mentions-wildcards-warn-but-deny.toml-has-deny"
                  fi
              fi
              # Rule 2: any open TRK row mentioning continue-on-error: true
              # for a workflow that no longer has it.
              # (Add cases here as new park-notes appear; for now MSan was
              # the only one and round-20 dropped it.)
              if grep -A0 '^| TRK-' docs/TRACKING.md | grep -q 'continue-on-error: true'; then
                  if ! grep -q 'continue-on-error: true' .github/workflows/sanitizers.yml; then
                      STALE="$STALE TRK-row-mentions-continue-on-error-true-but-sanitizers.yml-clean"
                  fi
              fi
          fi
          if [ -n "$STALE" ]; then
            echo "::error::docs/TRACKING.md has Open rows referring to state that's no longer true: $STALE"
            echo "Move the affected rows to the Closed section with a 'Closed by' note. See round-21 audit fix #17."
            exit 1
          fi

      - name: M9 — establish path must call verify_challenge_age
        run: |
          set -e
          # Round-19 M9: VerifiedSession::establish skipped verify_challenge_age.
          # Whenever generate_proof or verify_response is called from establish,
          # the immediately preceding lines must call verify_challenge_age.
          # Heuristic: search for `establish` blocks lacking the helper.
          if rg -n -B 5 'verify_response' latticearc/src/unified_api/zero_trust.rs \
              | rg -B 5 'fn establish' >/dev/null 2>&1; then
            # Establish exists; ensure verify_challenge_age is called within it.
            if ! rg -n -A 30 'fn establish\(' latticearc/src/unified_api/zero_trust.rs \
                | rg 'verify_challenge_age' >/dev/null; then
              echo "::error::VerifiedSession::establish must call verify_challenge_age before verify_response. See docs/MODULE_PATTERNS.md (unified_api::zero_trust)."
              exit 1
            fi
          fi

      - name: D1 — README SHA-2 row must not claim aws-lc-rs
        run: |
          set -e
          # Round-19 D1: README claimed SHA-2 routes through aws-lc-rs under
          # --features fips, but primitives/hash/sha2.rs uses the RustCrypto
          # `sha2` crate. The grep below catches future regressions.
          if rg -n '\| \*\*Hash\*\* \| SHA-2.*aws-lc-rs.*FIPS 140-3' README.md; then
            echo "::error::README SHA-2 row falsely claims aws-lc-rs FIPS validation. SHA-2 routes through RustCrypto sha2 crate; --features fips does NOT swap it."
            exit 1
          fi
