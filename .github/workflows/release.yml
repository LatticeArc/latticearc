name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Full verification before publishing — tests, lints, and audit
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Run tests
        run: cargo test --workspace --all-features --release
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Security audit
        # stale comment about a four-advisory
        # list and per-workflow sync rules removed. After an earlier audit #H-4
        # the single source of truth is `.cargo/audit.toml` (mirrored
        # by `deny.toml`); cargo-audit auto-discovers it. No CLI flags.
        run: |
          cargo install cargo-audit --locked
          cargo audit --deny warnings

  # Publish to crates.io
  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      # Single crate publish (all sub-crates consolidated into latticearc).
      # Tolerate "already uploaded/exists" so workflow re-runs don't fail.
      #
      # Capture cargo's exit code in a dedicated variable BEFORE
      # matching on the output, so a real failure (network drop, auth,
      # etc.) whose stderr happens to contain the substring "already
      # exists" cannot be silently treated as a successful idempotent
      # re-run. The previous shape used `OUTPUT=$(...) && exit 0`
      # followed by a substring grep — fine on success, but fragile
      # because the grep ran on output text without checking whether
      # cargo actually exited cleanly.
      - name: Publish latticearc
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          OUTPUT=$(cargo publish -p latticearc --token "$CARGO_REGISTRY_TOKEN" 2>&1)
          PUBLISH_EXIT=$?
          echo "$OUTPUT"
          if [ "$PUBLISH_EXIT" -eq 0 ]; then
            echo "::notice::Crate published successfully"
            exit 0
          fi
          # Non-zero exit. The only tolerated failure is "version already
          # published" on a workflow re-run.
          if echo "$OUTPUT" | grep -qE "already (uploaded|exists)"; then
            echo "::warning::Crate version already published — skipping"
            exit 0
          fi
          echo "::error::cargo publish failed with exit $PUBLISH_EXIT"
          exit "$PUBLISH_EXIT"

  # Create GitHub release
  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Extract changelog section for this version. VERSION is
          # bound via env: above so the value is shell-expanded at
          # runtime; inlining a workflow expression directly into a sed
          # argument let a malicious tag inject shell metacharacters.
          CHANGELOG=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d')
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}

  # Generate SBOM
  sbom:
    name: SBOM Generation
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      sbom-hash: ${{ steps.hash.outputs.sbom-hash }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      - name: Install SBOM tools
        run: |
          cargo install cargo-sbom --locked || true
          cargo install cargo-cyclonedx --locked || true
      - name: Generate SBOM (SPDX)
        run: cargo sbom > sbom.spdx.json || echo '{}' > sbom.spdx.json
        continue-on-error: true
      - name: Generate SBOM (CycloneDX)
        run: |
          # cargo-cyclonedx writes to bom.json/bom.xml in the project dir, not stdout.
          # Use explicit if/then/else — `A && B || C` evaluates as
          # `(A && B) || C`, so a successful generate followed by a
          # failed mv would have overwritten the just-generated SBOM
          # with the empty fallback.
          if cargo cyclonedx --all --format json; then
            mv -f bom.json sbom.cdx.json || echo '{}' > sbom.cdx.json
          else
            echo '{}' > sbom.cdx.json
          fi
          if cargo cyclonedx --all --format xml; then
            mv -f bom.xml sbom.cdx.xml || echo '<bom/>' > sbom.cdx.xml
          else
            echo '<bom/>' > sbom.cdx.xml
          fi
        continue-on-error: true
      - name: Generate hash
        id: hash
        run: |
          sha256sum sbom.cdx.json sbom.spdx.json > sbom-checksums.txt
          echo "sbom-hash=$(sha256sum sbom.cdx.json | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json
            sbom.cdx.xml
            sbom-checksums.txt

  # Build artifacts for provenance
  build-artifacts:
    name: Build Artifacts (${{ matrix.target }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cli_binary: latticearc-cli
          - target: x86_64-apple-darwin
            os: macos-15-intel
            cli_binary: latticearc-cli
          - target: aarch64-apple-darwin
            os: macos-latest
            cli_binary: latticearc-cli
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2

      # Go is required for aws-lc-fips-sys FIPS builds
      - name: Install Go (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version: 'stable'
          cache: false

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }} --all-features

      - name: Verify CLI binary
        run: |
          CLI_BIN="target/${{ matrix.target }}/release/${{ matrix.cli_binary }}"
          if [ -f "$CLI_BIN" ]; then
            echo "CLI binary found: $CLI_BIN ($(wc -c < "$CLI_BIN") bytes)"
            "$CLI_BIN" info || true
          else
            echo "Warning: CLI binary not found at $CLI_BIN"
          fi
        shell: bash

      - name: Generate checksums
        id: hash
        run: |
          cd target/${{ matrix.target }}/release
          # Include both library and CLI binary in checksums. The SLSA
          # provenance generator (later step) consumes `hashes=` as
          # `base64-subjects`; an empty value silently produces a
          # no-subject attestation that signs nothing. Fail fast here
          # if there's nothing to hash so a misconfigured build path
          # (renamed library, missing CLI binary, target-triple typo)
          # can't quietly publish an attestation that provides no
          # provenance.
          HASH_FILES=""
          for f in liblatticearc* ${{ matrix.cli_binary }}; do
            [ -f "$f" ] && HASH_FILES="$HASH_FILES $f"
          done
          if [ -z "$HASH_FILES" ]; then
            echo "::error::No build artifacts found for hashing (target=${{ matrix.target }})." >&2
            echo "::error::Expected liblatticearc* and ${{ matrix.cli_binary }} in target/${{ matrix.target }}/release/." >&2
            ls -la . >&2 || true
            exit 1
          fi
          sha256sum $HASH_FILES | tee checksums.txt
          HASHES_B64=$(sha256sum $HASH_FILES | base64 -w0)
          if [ -z "$HASHES_B64" ]; then
            echo "::error::sha256sum produced empty output; would yield no-subject SLSA attestation." >&2
            exit 1
          fi
          echo "hashes=$HASHES_B64" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          TARGET="${{ matrix.target }}"
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd target/${{ matrix.target }}/release

          # Package library artifacts
          for f in liblatticearc*; do
            [ -f "$f" ] && cp "$f" ../../../artifacts/"${f%.*}-${TARGET}.${f##*.}" 2>/dev/null || true
          done

          # Package CLI binary as tarball
          CLI_BIN="${{ matrix.cli_binary }}"
          if [ -f "$CLI_BIN" ]; then
            cd ../../..
            mkdir -p "latticearc-${VERSION}-${TARGET}"
            cp "target/${TARGET}/release/${CLI_BIN}" "latticearc-${VERSION}-${TARGET}/"
            cp latticearc-cli/README.md "latticearc-${VERSION}-${TARGET}/" 2>/dev/null || true
            cp latticearc-cli/QUICK_REFERENCE.md "latticearc-${VERSION}-${TARGET}/" 2>/dev/null || true
            tar czf "artifacts/latticearc-${VERSION}-${TARGET}.tar.gz" "latticearc-${VERSION}-${TARGET}"
            rm -rf "latticearc-${VERSION}-${TARGET}"
          fi

          [ -f "target/${TARGET}/release/checksums.txt" ] && cp "target/${TARGET}/release/checksums.txt" "artifacts/checksums-${TARGET}.txt" 2>/dev/null || true
        shell: bash
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: latticearc-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: warn

  # SLSA Level 3 Provenance
  provenance:
    name: SLSA Provenance
    needs: [build-artifacts]
    permissions:
      actions: read
      id-token: write
      contents: write
    # NOTE: SLSA reusable workflows require tag refs, not commit SHAs.
    # See: https://github.com/slsa-framework/slsa-github-generator/blob/main/SPECIFICATIONS.md
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build-artifacts.outputs.hashes }}"
      upload-assets: true

  # Sign artifacts with Sigstore Cosign
  sign-artifacts:
    name: Sign with Sigstore
    needs: [build-artifacts, sbom]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts/

      - name: Sign artifacts with Cosign (keyless)
        run: |
          echo "Signing artifacts with Sigstore Cosign..."

          # Sign library artifacts
          # sign-or-fail. Previously this step
          # had three layers of failure-swallowing — `2>/dev/null`,
          # `|| echo "Warning..."`, and `continue-on-error: true` —
          # which let releases ship unsigned. cosign exit codes now
          # propagate; `set -e` aborts on the first failure; the
          # outer `continue-on-error` is dropped; the upload step
          # demands `if-no-files-found: error`.
          set -e
          shopt -s nullglob
          for dir in artifacts/latticearc-*/; do
            for file in "$dir"liblatticearc*; do
              if [ -f "$file" ] && [[ ! "$file" =~ \.(sig|crt)$ ]]; then
                echo "Signing: $file"
                cosign sign-blob --yes \
                  --oidc-issuer https://token.actions.githubusercontent.com \
                  --output-signature "${file}.sig" \
                  --output-certificate "${file}.crt" \
                  "$file"
              fi
            done
          done

          # Sign SBOM (required, not best-effort).
          if [ -f "artifacts/sbom/sbom.cdx.json" ]; then
            echo "Signing SBOM..."
            cosign sign-blob --yes \
              --oidc-issuer https://token.actions.githubusercontent.com \
              --output-signature "artifacts/sbom/sbom.cdx.json.sig" \
              --output-certificate "artifacts/sbom/sbom.cdx.json.crt" \
              "artifacts/sbom/sbom.cdx.json"
          fi

      - name: Upload signatures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signatures
          path: |
            artifacts/**/*.sig
            artifacts/**/*.crt
          # error if signatures are missing.
          # `warn` previously masked the unsigned-release failure mode.
          if-no-files-found: error

  # Attach artifacts to release
  attach-release-artifacts:
    name: Attach Release Artifacts
    needs: [release, sbom, sign-artifacts, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts/

      - name: Remove empty files (GitHub rejects 0-byte uploads)
        run: find release-artifacts/ -type f -empty -delete

      - name: Attach to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          files: |
            release-artifacts/sbom/*
            release-artifacts/signatures/*
            release-artifacts/latticearc-*/*.tar.gz
            release-artifacts/latticearc-*/*.txt
            release-artifacts/latticearc-*/liblatticearc*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Release summary
  release-summary:
    name: Release Summary
    needs: [verify, publish, release, sbom, provenance, sign-artifacts]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "# Release Summary: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Verification | ${{ needs.verify.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM | ${{ needs.sbom.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SLSA Provenance | ${{ needs.provenance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sigstore Signing | ${{ needs.sign-artifacts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Supply Chain Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This release includes:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SLSA Level 3 build provenance" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Sigstore keyless signatures" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CycloneDX SBOM" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ SPDX SBOM" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To verify artifact signatures:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify-blob \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate artifact.crt \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --signature artifact.sig \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp 'https://github.com/.*' \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\\\" >> $GITHUB_STEP_SUMMARY
          echo "  artifact" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
