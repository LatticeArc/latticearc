name: Fuzzing

on:
  # Weekly scheduled fuzzing run. The `fuzz` matrix runs all 33 targets
  # in parallel; each target runs for 5 min wall-clock, so a full run is
  # ~5-10 min end-to-end. The `extended-fuzz` job (priority targets,
  # longer durations) fires only on the `schedule` trigger — not on
  # workflow_dispatch — via its `if: github.event_name == 'schedule'`
  # guard below.
  #
  # Not on push/PR: fuzzing is expensive and most of its value is in
  # continuous long-running campaigns, not per-commit checks. Kani,
  # clippy, and the unit-test suite handle per-PR correctness.
  schedule:
    - cron: '0 5 * * 0'  # Sundays 05:00 UTC (offset from other side-channel workflows)
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: Fuzzing Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # AEAD / Symmetric
          - encrypt_fuzz
          - fuzz_aes_gcm
          - fuzz_chacha20
          - chacha_poly_fuzz
          # KEM
          - fuzz_ml_kem_keygen
          - fuzz_ml_kem_encaps
          - fuzz_ml_kem_decaps
          - hybrid_kem_fuzz
          - fuzz_hybrid_encrypt
          - fuzz_hybrid_decrypt
          # Signatures
          - fuzz_ml_dsa_sign
          - fuzz_ml_dsa_verify
          - fuzz_slh_dsa_sign
          - fuzz_fn_dsa_sign
          - fuzz_fn_dsa_verify
          - fuzz_ed25519
          - hybrid_sign_fuzz
          - ml_dsa_fuzz
          # Hash / MAC / KDF
          - fuzz_sha256
          - fuzz_hkdf
          - fuzz_hmac_sha512
          - fuzz_pbkdf2
          # Key exchange
          - fuzz_x25519
          - fuzz_ecdh_p256
          # Hybrid
          - hybrid_encrypt_fuzz
          - hash_data_fuzz
          # Serialization / Deserialization
          - fuzz_portable_key_json
          - fuzz_encrypted_data_deser
          # Other
          - constant_time_fuzz
          - fuzz_random
          - fuzz_target_1
          - hmac_fuzz
          # DoS (allocation-bounded adversarial inputs)
          - fuzz_dos_alloc_bounded
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build fuzz targets
      run: |
        cd fuzz
        cargo fuzz build

    - name: Run fuzz tests (short duration)
      run: |
        cd fuzz
        timeout 300s cargo fuzz run ${{ matrix.target }} -- -max_total_time=300 || true

    - name: Upload fuzz artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: fuzz-artifacts-${{ matrix.target }}
        path: fuzz/artifacts/
        retention-days: 7

  extended-fuzz:
    name: Extended Fuzzing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        target:
          # Priority targets for extended fuzzing (attacker-controlled inputs)
          - fuzz_hybrid_decrypt
          - fuzz_ml_kem_decaps
          - fuzz_ml_dsa_verify
          - fuzz_fn_dsa_verify
          - fuzz_slh_dsa_sign
          - fuzz_ed25519
          - fuzz_portable_key_json
          - fuzz_encrypted_data_deser
          - fuzz_aes_gcm
          - fuzz_chacha20
          - encrypt_fuzz
          - hash_data_fuzz
          - hybrid_kem_fuzz
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-extended-fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run extended fuzz tests
      run: |
        cd fuzz
        timeout 3600s cargo fuzz run ${{ matrix.target }} -- -max_total_time=3600 || true

    - name: Upload extended fuzz artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: extended-fuzz-artifacts-${{ matrix.target }}
        path: fuzz/artifacts/
        retention-days: 7

  fuzz-coverage:
    name: Fuzzing Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly
        components: llvm-tools-preview

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # main
      with:
        tool: cargo-llvm-cov

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run fuzz with coverage
      run: |
        cd fuzz
        # First, run fuzzer briefly to generate corpus inputs
        timeout 60s cargo fuzz run encrypt_fuzz -- -max_total_time=60 || true
        # Then generate coverage from the corpus (may fail if corpus is empty)
        cargo fuzz coverage encrypt_fuzz -- -max_total_time=60 || echo "Fuzz coverage skipped (no corpus)"

    - name: Upload fuzz coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-coverage
        path: fuzz/coverage/
        retention-days: 30

  fuzz-report:
    name: Fuzzing Report
    runs-on: ubuntu-latest
    needs: [fuzz, extended-fuzz, fuzz-coverage]
    if: always()
    steps:
    - name: Generate fuzzing summary
      run: |
        echo "# Fuzzing Report Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Fuzzing Tests | ${{ needs.fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Extended Fuzzing | ${{ needs.extended-fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Fuzzing Coverage | ${{ needs.fuzz-coverage.result }} |" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      run: |
        if [[ "${{ needs.fuzz.result }}" == "failure" ]]; then
          echo "❌ Fuzzing tests failed!"
          exit 1
        else
          echo "✅ Fuzzing tests passed!"
        fi