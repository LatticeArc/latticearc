name: Fuzzing

on:
  # Weekly scheduled fuzzing run. The `fuzz` matrix runs all 33 targets
  # in parallel; each target runs for 5 min wall-clock, so a full run is
  # ~5-10 min end-to-end. The `extended-fuzz` job (priority targets,
  # longer durations) fires only on the `schedule` trigger — not on
  # workflow_dispatch — via its `if: github.event_name == 'schedule'`
  # guard below.
  #
  # Not on push/PR: fuzzing is expensive and most of its value is in
  # continuous long-running campaigns, not per-commit checks. Kani,
  # clippy, and the unit-test suite handle per-PR correctness.
  schedule:
    - cron: '0 5 * * 0'  # Sundays 05:00 UTC (offset from other side-channel workflows)
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: Fuzzing Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # AEAD / Symmetric
          - encrypt_fuzz
          - fuzz_aes_gcm
          - fuzz_chacha20
          - chacha_poly_fuzz
          # KEM
          - fuzz_ml_kem_keygen
          - fuzz_ml_kem_encaps
          - fuzz_ml_kem_decaps
          - hybrid_kem_fuzz
          # `fuzz_hybrid_encrypt` /
          # `fuzz_hybrid_decrypt` were fictional names; the real
          # target is `hybrid_encrypt_fuzz` (one binary, exercises
          # both directions via roundtrip) — see fuzz/Cargo.toml.
          - hybrid_encrypt_fuzz
          # Signatures
          - fuzz_ml_dsa_sign
          - fuzz_ml_dsa_verify
          - fuzz_slh_dsa_sign
          - fuzz_fn_dsa_sign
          - fuzz_fn_dsa_verify
          - fuzz_ed25519
          - hybrid_sign_fuzz
          - ml_dsa_fuzz
          # Hash / MAC / KDF
          - fuzz_sha256
          - fuzz_hkdf
          - fuzz_hmac_sha512
          - fuzz_pbkdf2
          # Key exchange
          - fuzz_x25519
          - fuzz_ecdh_p256
          # Hybrid (moved `hybrid_encrypt_fuzz` up
          # to the KEM section as the canonical replacement for the
          # fictional `fuzz_hybrid_encrypt` / `fuzz_hybrid_decrypt`;
          # an earlier audit removes this duplicate). `hybrid_kem_fuzz` and
          # `hybrid_sign_fuzz` are listed separately below in their
          # respective sections.
          - hash_data_fuzz
          # Serialization / Deserialization
          - fuzz_portable_key_json
          - fuzz_encrypted_data_deser
          # Other
          - constant_time_fuzz
          - fuzz_random
          - fuzz_target_1
          - hmac_fuzz
          # DoS (allocation-bounded adversarial inputs)
          - fuzz_dos_alloc_bounded
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}

    # an earlier audit follow-up: build only the matrix target (was `cargo
    # fuzz build` with no arg, which built all 35+ targets but didn't
    # share artifacts cleanly with the per-target `cargo fuzz run` —
    # the run step then re-built incrementally and ate 1m+ of the
    # 360s budget before fuzzing started). Matching the extended-fuzz
    # convention.
    - name: Build fuzz target
      run: |
        cd fuzz
        cargo fuzz build "${{ matrix.target }}"

    - name: Run fuzz tests (short duration)
      run: |
        cd fuzz
        # No `|| true` wrapper: masking the exit code prevents the
        # `if: failure()` artifact-upload step below from firing on a
        # real crash. Outer `timeout` is 600s and `-max_total_time` is
        # 300s — the gap accommodates cargo-fuzz's incremental
        # rebuild check (~80s on cold cache even after the prior
        # build step) plus libfuzzer cleanup, with 200s headroom.
        # an earlier audit follow-up: bumped from 360s after slow runners hit
        # 4m+ of build/init time.
        timeout 600s cargo fuzz run "${{ matrix.target }}" -- -max_total_time=300

    - name: Upload fuzz artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: fuzz-artifacts-${{ matrix.target }}
        path: fuzz/artifacts/
        retention-days: 7

  extended-fuzz:
    name: Extended Fuzzing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        target:
          # Priority targets for extended fuzzing (attacker-controlled inputs).
          # `fuzz_hybrid_decrypt` was fictional; the
          # real target `hybrid_encrypt_fuzz` exercises both directions
          # via roundtrip.
          - hybrid_encrypt_fuzz
          - fuzz_ml_kem_decaps
          - fuzz_ml_dsa_verify
          - fuzz_fn_dsa_verify
          - fuzz_slh_dsa_sign
          - fuzz_ed25519
          - fuzz_portable_key_json
          - fuzz_encrypted_data_deser
          - fuzz_aes_gcm
          - fuzz_chacha20
          - encrypt_fuzz
          - hash_data_fuzz
          - hybrid_kem_fuzz
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-extended-fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}

    # an earlier audit follow-up: pre-build the target so the outer `timeout`
    # only governs the actual fuzz execution, not the cold-cache rebuild
    # that `cargo fuzz run` performs on every invocation. With cache
    # misses the build can eat 30+ min of the 60-min budget and the
    # outer timeout fires before any meaningful fuzzing happens (exit
    # code 124). `matrix.target` is a static workflow-defined string —
    # not user-controllable — so direct interpolation is safe.
    - name: Build extended fuzz target
      run: |
        cd fuzz
        cargo fuzz build "${{ matrix.target }}"

    - name: Run extended fuzz tests
      run: |
        cd fuzz
        # No `|| true` wrapper — see the short-duration job above. Both
        # the outer `timeout` and `-max_total_time` are set to 3300s
        # (55 min), leaving 5 min headroom inside the 90-min job
        # timeout for libfuzzer cleanup, artifact upload, and step
        # overhead.
        timeout 3300s cargo fuzz run "${{ matrix.target }}" -- -max_total_time=3300

    - name: Upload extended fuzz artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: extended-fuzz-artifacts-${{ matrix.target }}
        path: fuzz/artifacts/
        retention-days: 7

  fuzz-coverage:
    name: Fuzzing Coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly
        components: llvm-tools-preview

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz --locked

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@c070f87102a1c75b3183910f391c1cb887fe13c8 # main
      with:
        tool: cargo-llvm-cov

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-coverage-cargo-${{ hashFiles('**/Cargo.lock') }}

    # an earlier audit follow-up: pre-build before applying the timeout, mirroring
    # the extended-fuzz job. Cold-cache builds can exceed the 60s budget
    # if the timeout governs the build phase too; splitting fixes that.
    - name: Build fuzz coverage target
      run: |
        cd fuzz
        cargo fuzz build encrypt_fuzz

    - name: Run fuzz with coverage
      run: |
        cd fuzz
        # First, run fuzzer briefly to generate corpus inputs. No
        # `|| true` wrapper: a crash in the seed-generation phase
        # should fail the job rather than silently producing empty
        # coverage data. Build is in the previous step so the outer
        # `timeout` here only governs the fuzz execution itself.
        # Outer `timeout 600s` covers the 60s `-max_total_time` plus
        # libfuzzer cleanup AND any incremental rebuild cargo-fuzz
        # triggers under `run` — previous 90s budget truncated
        # cold-cache runs at the build phase (exit 124).
        timeout 600s cargo fuzz run encrypt_fuzz -- -max_total_time=60
        # Then generate coverage from the corpus (may fail if corpus is empty)
        timeout 600s cargo fuzz coverage encrypt_fuzz -- -max_total_time=60 \
          || echo "Fuzz coverage skipped (no corpus)"

    - name: Upload fuzz coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-coverage
        path: fuzz/coverage/
        retention-days: 30

  fuzz-report:
    name: Fuzzing Report
    runs-on: ubuntu-latest
    needs: [fuzz, extended-fuzz, fuzz-coverage]
    if: always()
    steps:
    - name: Generate fuzzing summary
      run: |
        echo "# Fuzzing Report Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Fuzzing Tests | ${{ needs.fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Extended Fuzzing | ${{ needs.extended-fuzz.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Fuzzing Coverage | ${{ needs.fuzz-coverage.result }} |" >> $GITHUB_STEP_SUMMARY

    - name: Check overall status
      run: |
        if [[ "${{ needs.fuzz.result }}" == "failure" ]]; then
          echo "❌ Fuzzing tests failed!"
          exit 1
        else
          echo "✅ Fuzzing tests passed!"
        fi