name: Dependabot Auto-Merge

# Round-35 M8: switched from `pull_request` (which executes in the
# PR HEAD context with elevated tokens for same-repo PRs) to
# `pull_request_target` (which executes in the BASE branch context).
# This workflow only calls `gh pr merge` / `gh pr review` against
# the PR URL, so PR-controlled scripts can never run. Combined with
# the `github.actor == 'dependabot[bot]'` gate, the event change
# removes the structural pwn-request concern even if a future step
# is added.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: read-all

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Check if PR has automerge label
        id: check-label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            return labels.includes('automerge');

      - name: Enable auto-merge for Dependabot PRs
        if: steps.check-label.outputs.result == 'true'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: steps.check-label.outputs.result == 'true'
        # Org may block GITHUB_TOKEN from approving PRs; don't fail the workflow
        continue-on-error: true
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
