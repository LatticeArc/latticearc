# CodeQL Security Analysis
# GitHub's semantic code analysis for security vulnerabilities

name: CodeQL

on:
  push:
    # Round-21 audit fix #22: previously CodeQL only ran on PRs and the
    # weekly schedule. Direct pushes to main (squash-merged Dependabot
    # PRs, hotfixes that bypass review, admin-bypass merges of audit
    # rounds) went unanalysed for up to a week.
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 8 AM UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-codeql-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: rust
          queries: security-extended,security-and-quality
        env:
          CODEQL_ENABLE_EXPERIMENTAL_FEATURES: true

      - name: Build for CodeQL analysis
        run: cargo build --workspace --all-features

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          category: "/language:rust"
