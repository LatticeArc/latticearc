name: CLI

on:
  push:
    branches: [main, develop]
    paths:
      - 'latticearc-cli/**'
      - 'latticearc/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'latticearc-cli/**'
      - 'latticearc/src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/cli.yml'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # =========================================================================
  # CLI Tests — runs on all platforms
  # =========================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: cli-${{ matrix.os }}

      - name: Install build dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build CLI
        run: cargo build -p latticearc-cli --release

      - name: Run CLI unit tests
        run: cargo test -p latticearc-cli --release

      - name: Run CLI integration tests
        run: cargo test -p latticearc-cli --release --test '*'

      - name: Verify CLI binary runs
        run: cargo run -p latticearc-cli --release -- info
        shell: bash

      - name: Verify CLI help
        run: cargo run -p latticearc-cli --release -- --help
        shell: bash

  # =========================================================================
  # CLI Lint & Format
  # =========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: cli-lint

      - name: Check formatting
        run: cargo fmt -p latticearc-cli -- --check

      - name: Run clippy
        run: cargo clippy -p latticearc-cli --all-targets --all-features -- -D warnings

  # =========================================================================
  # CLI Proof Evidence — verifies structured proof output
  # =========================================================================
  proof-evidence:
    name: Proof Evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: cli-proof

      - name: Run proof evidence tests
        run: |
          cargo test -p latticearc-cli --release --test cli_proof_evidence --test keystore_proof_evidence -- --nocapture 2>&1 | tee proof_output.txt

      - name: Extract and validate proofs
        run: |
          PROOF_COUNT=$(grep -c '^\[PROOF\]' proof_output.txt || true)
          echo "Found $PROOF_COUNT proof lines"
          if [ "$PROOF_COUNT" -lt 50 ]; then
            echo "ERROR: Expected at least 50 proof lines, got $PROOF_COUNT"
            exit 1
          fi
          echo "All proof evidence validated."

      - name: Save proof evidence
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: cli-proof-evidence
          path: proof_output.txt
          retention-days: 90

  # =========================================================================
  # Cross-platform binary builds
  # =========================================================================
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          key: cli-build-${{ matrix.target }}

      - name: Install build dependencies (Ubuntu)
        if: matrix.runner == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build release binary
        run: cargo build -p latticearc-cli --release

      - name: Upload binary (Linux)
        if: matrix.runner == 'ubuntu-latest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: latticearc-${{ matrix.target }}
          path: target/release/latticearc

      - name: Upload binary (macOS)
        if: matrix.runner == 'macos-latest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: latticearc-${{ matrix.target }}
          path: target/release/latticearc

      - name: Upload binary (Windows)
        if: matrix.runner == 'windows-latest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: latticearc-${{ matrix.target }}
          path: target/release/latticearc.exe
