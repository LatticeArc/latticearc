name: CI

# =============================================================================
# Tiered CI/CD Strategy
# =============================================================================
# Tier 1 - Quick: Every push (unit, negative, regression tests)
# Tier 2 - Standard: PRs to main (+ integration, KAT, TLS, API, concurrency)
# Tier 3 - Full: Merge to main (+ side-channel, performance benchmarks)
# Tier 4 - Nightly: Scheduled 2 AM daily (+ short fuzz, security audit)
# Tier 5 - Weekly: Scheduled 4 AM Sunday (+ full fuzz, interop tests)
# =============================================================================

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  # Tier 4 (nightly) and Tier 5 (weekly) scheduled runs. Without these
  # crons the `is_nightly` / `is_weekly` outputs in the `changes` job —
  # which gate the heavyweight fuzz / feature-powerset / formal-
  # verification jobs — never evaluate true outside `workflow_dispatch`,
  # so those jobs effectively never run. Re-enabling here so the
  # schedule-driven coverage is real, not aspirational.
  schedule:
    - cron: '0 2 * * *'  # Tier 4: Daily at 2 AM UTC (Nightly)
    - cron: '0 4 * * 0'  # Tier 5: Weekly at 4 AM UTC Sunday
  workflow_dispatch:
    inputs:
      tier:
        description: 'CI Tier to run'
        required: false
        default: 'standard'
        type: choice
        options:
          - quick
          - standard
          - full
          - nightly
          - weekly

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTFLAGS: "-D warnings"
  # Repository type detection
  REPO_TYPE: apache
  # OpenTelemetry configuration
  OTEL_SERVICE_NAME: latticearc-apache-ci
  OTEL_TRACES_EXPORTER: otlp
  OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT || 'http://localhost:4318' }}
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  # Prometheus metrics
  PROMETHEUS_PUSHGATEWAY: ${{ secrets.PROMETHEUS_PUSHGATEWAY || 'http://localhost:9091' }}

jobs:
  # =============================================================================
  # Path Filter - Detect what changed for optimized test execution
  # =============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      crypto: ${{ steps.filter.outputs.crypto }}
      cli: ${{ steps.filter.outputs.cli }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
      ci: ${{ steps.filter.outputs.ci }}
      # Union of anything that affects runtime or test behaviour. True if the
      # PR actually changes code or dependencies; false for YAML-only
      # Dependabot github-actions bumps. Used to skip heavy build/test jobs
      # on PRs that can't affect their outcome.
      code: ${{ steps.filter.outputs.code }}
      is_nightly: ${{ github.event.schedule == '0 2 * * *' }}
      is_weekly: ${{ github.event.schedule == '0 4 * * 0' }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          crypto:
            - 'latticearc/**'
          cli:
            - 'latticearc-cli/**'
          tests:
            - '**/tests/**'
            - 'tests/**'
            - 'fuzz/**'
          docs:
            - 'docs/**'
            - '**/*.md'
          ci:
            - '.github/workflows/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
          code:
            - 'latticearc/**'
            - 'latticearc-cli/**'
            - '**/tests/**'
            - 'tests/**'
            - 'fuzz/**'
            - 'Cargo.toml'
            - 'Cargo.lock'

  # === Code Quality Checks ===
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      with:
        components: rustfmt, clippy

    - name: Setup OpenTelemetry
      run: |
        # Install OpenTelemetry collector (if not using external service)
        # For local testing, we'll use a mock setup
        echo "OpenTelemetry tracing enabled for CI quality checks"

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Check formatting
      run: |
        START_TIME=$(date +%s)
        cargo fmt --all -- --check
        END_TIME=$(date +%s)
        FMT_DURATION=$((END_TIME - START_TIME))
        echo "fmt_duration_seconds $FMT_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-quality/instance/${{ github.run_id }}/operation/fmt || true

    - name: Enhanced Clippy lints (Rust 2024)
      run: |
        START_TIME=$(date +%s)
        cargo clippy --workspace --all-targets --all-features -- \
          -D warnings \
          -D clippy::unwrap_used \
          -D clippy::expect_used \
          -D clippy::panic \
          -D clippy::todo \
          -D clippy::unimplemented \
          -W clippy::arithmetic_side_effects \
          -W clippy::cast_lossless \
          -W clippy::cast_possible_truncation \
          -W clippy::cast_precision_loss \
          -W clippy::float_cmp \
          -W clippy::implicit_clone
        END_TIME=$(date +%s)
        CLIPPY_DURATION=$((END_TIME - START_TIME))
        echo "clippy_duration_seconds $CLIPPY_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-quality/instance/${{ github.run_id }}/operation/clippy || true

    - name: Check documentation
      run: |
        START_TIME=$(date +%s)
        cargo doc --workspace --all-features --no-deps --document-private-items
        END_TIME=$(date +%s)
        DOC_DURATION=$((END_TIME - START_TIME))
        echo "doc_duration_seconds $DOC_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-quality/instance/${{ github.run_id }}/operation/doc || true

    - name: Resource-limits coverage gate
      run: bash scripts/ci/resource_limits_coverage.sh

  # === MSRV (Minimum Supported Rust Version) ===
  # Round-13 audit fix (L-A): pin to the exact version declared in
  # `[workspace.package].rust-version` (1.93). Without this, every
  # other job uses `dtolnay/rust-toolchain@stable`, so a future stable
  # accepting code that 1.93 rejects would silently raise our effective
  # MSRV without any signal to downstream users on 1.93.
  msrv:
    name: MSRV (1.93)
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust 1.93 (declared MSRV)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7
      with:
        toolchain: "1.93"

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

    - name: cargo check (workspace, all features)
      run: cargo +1.93 check --workspace --all-features

  # === SemVer surface check ===
  # Round-13 audit fix (L-B): the `tests/tests/api_stability.rs` doc
  # comment claimed cargo-semver-checks "runs separately" — but no job
  # actually ran it. This job runs `cargo semver-checks` against the
  # last released `latticearc` on crates.io and surfaces breaking
  # public-API changes BEFORE merge so the [Unreleased] CHANGELOG
  # section can label them correctly.
  semver-checks:
    name: SemVer surface
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    # Soft-fail until we publish a real 0.8.0 baseline that
    # cargo-semver-checks can resolve from crates.io. Promote to
    # blocking once a baseline release lands. Tracked separately.
    continue-on-error: true
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Run cargo-semver-checks
      # Round-14 audit fix: SHA-pin to match the workflow's strict
      # action-pinning policy. Floating tags can be moved to point at
      # arbitrary commits (including malicious code) by the action's
      # owner — every other action in this file uses a 40-char SHA
      # with the tag in a trailing comment.
      uses: obi1kenobi/cargo-semver-checks-action@5b298c9520f7096a4683c0bd981a7ac5a7e249ae # v2.8

  # === Multi-Platform Builds ===
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, quality]
    # Skip on PRs that only touch CI YAML (Dependabot github-actions bumps etc.)
    # — the rebuild can't produce different results. Always run on push/schedule.
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      with:
        targets: ${{ matrix.target }}

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Go (required for aws-lc-fips-sys on macOS)
      if: runner.os == 'macOS'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
      with:
        go-version: '1.22'

    - name: Build workspace
      run: |
        START_TIME=$(date +%s)
        cargo build --workspace --target ${{ matrix.target }} --release --all-features
        END_TIME=$(date +%s)
        BUILD_DURATION=$((END_TIME - START_TIME))
        echo "build_duration_seconds $BUILD_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-build/instance/${{ github.run_id }}/target/${{ matrix.target }}/operation/workspace-build || true

    - name: Test build artifacts
      run: |
        START_TIME=$(date +%s)
        cargo test --workspace --target ${{ matrix.target }} --release --all-features --no-run
        END_TIME=$(date +%s)
        ARTIFACT_TEST_DURATION=$((END_TIME - START_TIME))
        echo "artifact_test_duration_seconds $ARTIFACT_TEST_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-build/instance/${{ github.run_id }}/target/${{ matrix.target }}/operation/artifact-test || true

  # === Security Scanning (Enhanced for Rust 2024) ===
  security:
    name: Security & Supply Chain
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Install security tools
      run: |
        cargo install cargo-audit
        cargo install cargo-deny

    - name: Run cargo-audit (enhanced vulnerability scanning)
      run: |
        # Round-12 audit fix (H-4): the per-advisory `--ignore` flags
        # were the source of suppression drift across rounds (only one
        # had a justification comment, two were stale). The single
        # source of truth is now `.cargo/audit.toml [advisories].ignore`
        # (mirrored by `deny.toml [advisories].ignore`), each with a
        # justification + revisit trigger. cargo-audit auto-discovers
        # `.cargo/audit.toml` so no CLI flags are needed.
        cargo audit --deny warnings || \
          (echo "Security vulnerabilities found!" && exit 1)

    - name: Run cargo-deny (license & dependency checks)
      run: cargo deny check all

    - name: Build release binaries for security analysis
      run: cargo build --release --workspace

    - name: Run cargo-checksec (binary security analysis)
      uses: asymmetric-research/checksec-action@d17d6f8da659c9e71a633ab0bd679f72ff3cb0bb # main
      continue-on-error: true  # Library project has no binaries to analyze
      with:
        directory: target/release

  # === Testing (Apache-focused) ===
  test:
    name: Tests (${{ matrix.profile }}, ${{ matrix.features.label }})
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        # Only run release - dev mode is 10x slower for crypto ops (SLH-DSA)
        # Debug-specific issues are caught by clippy and other static analysis
        profile: [release]
        # Exercise every supported feature configuration on every push so that
        # behaviour drift between configs is visible at PR time, not at release
        # time. The all-features row is canonical (covers every test); the fips
        # and no-default rows catch feature-gating regressions that previously
        # went unnoticed (e.g. tests reaching code paths that depend on the
        # `fips` feature without `#[cfg(feature = "fips")]`).
        features:
          - label: all-features
            scope: --workspace
            flags: --all-features
            coverage: true
          - label: fips
            scope: --workspace
            flags: --features fips
            coverage: false
          - label: no-default-features
            # Only `latticearc` builds without default features; the
            # `latticearc-cli` and `latticearc-tests` crates require features
            # (and `latticearc-tests` requires fips for its CAVP and FIPS
            # validation suites).
            scope: -p latticearc
            flags: --no-default-features
            coverage: false
          # Feature-isolation rows: each opt-in non-FIPS feature must
          # build and test cleanly *standalone* (no `--all-features` umbrella),
          # otherwise OS-specific failure modes (e.g. `secret-mlock` and
          # Linux `RLIMIT_MEMLOCK` / Windows working-set quota) hide behind
          # the always-on combinations.
          - label: fips-self-test
            scope: -p latticearc
            flags: --no-default-features --features fips-self-test
            coverage: false
          - label: kat-test-vectors
            scope: -p latticearc
            flags: --no-default-features --features kat-test-vectors
            coverage: false
          - label: secret-mlock
            scope: -p latticearc
            flags: --no-default-features --features secret-mlock
            coverage: false
          - label: tracing-init
            scope: -p latticearc
            flags: --no-default-features --features tracing-init
            coverage: false

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      if: matrix.features.coverage
      uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # main
      with:
        tool: cargo-llvm-cov

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-test-cargo-${{ matrix.features.label }}-${{ hashFiles('**/Cargo.lock') }}

    - name: Run unit tests
      run: |
        START_TIME=$(date +%s)
        cargo test ${{ matrix.features.scope }} --profile ${{ matrix.profile }} ${{ matrix.features.flags }} --no-fail-fast
        END_TIME=$(date +%s)
        TEST_DURATION=$((END_TIME - START_TIME))
        echo "unit_test_duration_seconds $TEST_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/profile/${{ matrix.profile }}/features/${{ matrix.features.label }}/operation/unit-test || true

    - name: Run integration tests
      run: |
        START_TIME=$(date +%s)
        cargo test ${{ matrix.features.scope }} --profile ${{ matrix.profile }} ${{ matrix.features.flags }} --test '*' --no-fail-fast
        END_TIME=$(date +%s)
        INTEGRATION_DURATION=$((END_TIME - START_TIME))
        echo "integration_test_duration_seconds $INTEGRATION_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/profile/${{ matrix.profile }}/features/${{ matrix.features.label }}/operation/integration-test || true

    # Note: Kani formal verification (12 proofs in latticearc types module, pure Rust).
    # Not run on every commit due to computational cost. See kani.yml.

    - name: Generate coverage report
      if: matrix.features.coverage
      run: |
        START_TIME=$(date +%s)
        cargo llvm-cov ${{ matrix.features.scope }} ${{ matrix.features.flags }} --release --lcov --output-path lcov.info
        END_TIME=$(date +%s)
        COVERAGE_DURATION=$((END_TIME - START_TIME))
        COVERAGE=$(grep -o '"covered_percent":[0-9.]*' lcov.info | head -1 | grep -o '[0-9.]*' || echo "0")
        echo "coverage_generation_duration_seconds $COVERAGE_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/operation/coverage-generation || true
        echo "test_coverage_percent $COVERAGE" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/operation/test-coverage || true

    - name: Upload coverage to Codecov
      if: matrix.features.coverage
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
      with:
        files: lcov.info
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  # =============================================================================
  # Tier 1 - Quick Tests (Every Push)
  # =============================================================================

  # === Regression Tests (Quick Tier) ===
  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-regression-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run regression tests
      run: |
        START_TIME=$(date +%s)
        cargo test --workspace --all-features --release -- regression
        if [ -d "tests/regression" ]; then
          cargo test --test 'regression_*' --all-features --release
        fi
        END_TIME=$(date +%s)
        REGRESSION_DURATION=$((END_TIME - START_TIME))
        echo "regression_test_duration_seconds $REGRESSION_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/operation/regression-test || true

  # =============================================================================
  # Tier 2 - Standard Tests (PRs)
  # =============================================================================

  # === Concurrency Tests (Standard Tier) ===
  concurrency-tests:
    name: Concurrency Tests
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-concurrency-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run concurrency tests
      run: |
        START_TIME=$(date +%s)
        cargo test --package latticearc --test primitives_concurrency --all-features --release
        cargo test --workspace --all-features --release -- concurrent parallel thread
        END_TIME=$(date +%s)
        CONCURRENCY_DURATION=$((END_TIME - START_TIME))
        echo "concurrency_test_duration_seconds $CONCURRENCY_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/operation/concurrency-test || true

  # === API Stability Tests (Standard Tier) ===
  api-stability-tests:
    name: API Stability Tests
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-api-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run API stability tests
      run: |
        START_TIME=$(date +%s)
        if [ -d "tests/api_stability" ]; then
          cargo test --test 'api_*' --all-features --release
        fi
        cargo test --workspace --all-features --release -- serialization_stability
        cargo test --workspace --all-features --release -- backward_compat
        END_TIME=$(date +%s)
        API_DURATION=$((END_TIME - START_TIME))
        echo "api_stability_test_duration_seconds $API_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-test/instance/${{ github.run_id }}/operation/api-stability-test || true

  # === CLI Integration Tests ===
  cli-tests:
    name: CLI Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [changes, quality, build]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Install Go (required for aws-lc-fips-sys on macOS)
      if: runner.os == 'macOS'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
      with:
        go-version: 'stable'

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cli-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run CLI integration tests
      run: cargo test -p latticearc-cli --release

    - name: Verify CLI binary runs
      run: cargo run -p latticearc-cli --release -- info
      shell: bash

  # =============================================================================
  # Tier 4/5 - Scheduled Tests (Nightly/Weekly)
  # =============================================================================

  # === Fuzzing - Nightly (Tier 4) ===
  fuzz-nightly:
    name: Fuzzing Tests (Nightly)
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    # Run on nightly schedule or when manually triggered with nightly/weekly tier
    if: needs.changes.outputs.is_nightly == 'true' || github.event.inputs.tier == 'nightly' || github.event.inputs.tier == 'weekly'
    strategy:
      matrix:
        fuzz-target: ["encrypt_fuzz", "hash_data_fuzz"]

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run fuzz tests (5 min each for nightly)
      run: |
        cd fuzz
        cargo +nightly fuzz run ${{ matrix.fuzz-target }} -- -max_total_time=300

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-crash-nightly-${{ matrix.fuzz-target }}
        path: fuzz/artifacts/${{ matrix.fuzz-target }}/

  # === Fuzzing - Weekly Extended (Tier 5) ===
  fuzz-weekly:
    name: Fuzzing Tests (Weekly Extended)
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    # Run only on weekly schedule
    if: needs.changes.outputs.is_weekly == 'true' || github.event.inputs.tier == 'weekly'
    strategy:
      fail-fast: false
      matrix:
        # Round-15 audit fix: 7 of 9 prior matrix entries were fictional
        # target names (decrypt_fuzz, kem_fuzz, signature_fuzz,
        # hybrid_fuzz, kdf_fuzz, hash_fuzz, serialization_fuzz) — none
        # declared in fuzz/Cargo.toml. They `cargo fuzz run`-failed
        # silently every weekly run, so 90% of the advertised "weekly
        # fuzz coverage" was theatre. Replaced with the actual target
        # names from `fuzz/Cargo.toml`, grouped by surface for
        # operator readability. Verify with `cargo fuzz list` before
        # adding entries.
        fuzz-target:
          # AEAD / symmetric
          - encrypt_fuzz
          - fuzz_aes_gcm
          - fuzz_chacha20
          - chacha_poly_fuzz
          # KEM
          - hybrid_kem_fuzz
          - fuzz_ml_kem_keygen
          - fuzz_ml_kem_encaps
          - fuzz_ml_kem_decaps
          # Signatures
          - hybrid_sign_fuzz
          - ml_dsa_fuzz
          - fuzz_ml_dsa_sign
          - fuzz_ml_dsa_verify
          - fuzz_slh_dsa_sign
          - fuzz_fn_dsa_sign
          - fuzz_fn_dsa_verify
          - fuzz_ed25519
          # Hash / MAC / KDF
          - fuzz_sha256
          - hash_data_fuzz
          - fuzz_hkdf
          - fuzz_pbkdf2
          - fuzz_hmac_sha512
          - hmac_fuzz
          # Serialization / wire-format
          - fuzz_portable_key_json
          - fuzz_encrypted_data_deser
          # ECDH / key agreement
          - fuzz_x25519
          - fuzz_ecdh_p256
          # DoS / resource bounds
          - fuzz_dos_alloc_bounded
          - fuzz_random

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-weekly-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run fuzz tests (30 min each for weekly)
      # `continue-on-error: true` rather than `|| true` so the step's
      # actual exit code is preserved — `if: failure()` on the upload
      # below will still fire on a crash, while the workflow as a whole
      # remains green. The earlier `|| true` masked the exit code to 0,
      # so the upload never ran and crashes left no signal at all.
      continue-on-error: true
      run: |
        cd fuzz
        cargo +nightly fuzz run ${{ matrix.fuzz-target }} -- -max_total_time=1800

    - name: Upload crash artifacts
      if: failure()
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-crash-weekly-${{ matrix.fuzz-target }}
        path: fuzz/artifacts/${{ matrix.fuzz-target }}/

  # === Quick Fuzz Smoke Test (PRs only) ===
  fuzz-smoke:
    name: Fuzz Smoke Test
    runs-on: ubuntu-latest
    needs: [changes, quality, build]
    # Run on PRs when crypto code changed
    if: github.event_name == 'pull_request' && needs.changes.outputs.crypto == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust Nightly
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # nightly
      with:
        toolchain: nightly

    - name: Install cargo-fuzz
      run: cargo install cargo-fuzz

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-fuzz-smoke-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run quick fuzz smoke test (30s each)
      # Round-13 audit fix (H-A): the previous `continue-on-error: true`
      # kept the run step's outcome green even on a fuzzer crash, which
      # defeated round-12's H-5 promotion of `fuzz-smoke` to PR-blocking
      # (the `failed_jobs` gate watched `needs.fuzz-smoke.result` but
      # that result was always 'success'). The flag was originally there
      # to keep `if: failure()`-gated upload steps reachable; we now
      # gate uploads on `if: ${{ failure() || cancelled() }}` instead so
      # crashes both fail the job AND surface artifacts.
      run: |
        # Round-15 audit fix: `kem_fuzz` was a fictional target name —
        # never declared in fuzz/Cargo.toml. The real KEM target is
        # `hybrid_kem_fuzz` (encap + decap roundtrip via the hybrid
        # path). Until round-12 this typo was masked by `continue-on-error:
        # true`; round-13 H-A removed that flag so the typo would have
        # blocked every PR on a fictional-target build error rather
        # than a real fuzz crash.
        cd fuzz
        cargo +nightly fuzz run encrypt_fuzz -- -max_total_time=30
        cargo +nightly fuzz run hybrid_kem_fuzz -- -max_total_time=30

    - name: Upload crash artifacts (smoke)
      # Round-14 audit fix: gate matches the round-13 H-A rationale on
      # the run step above — `failure() || cancelled()` so a job
      # cancellation (timeout, manual cancel during a long fuzz run)
      # also surfaces any partial corpus / crash artifacts the fuzzer
      # produced before being killed.
      if: ${{ failure() || cancelled() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: fuzz-crash-smoke
        path: fuzz/artifacts/

  # === Performance & Benchmarking ===
  performance:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: [quality, build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-bench-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run benchmarks
      run: |
        START_TIME=$(date +%s)
        
        cargo bench --workspace --all-features
        END_TIME=$(date +%s)
        BENCH_DURATION=$((END_TIME - START_TIME))
        echo "benchmark_duration_seconds $BENCH_DURATION" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-performance/instance/${{ github.run_id }}/operation/benchmark-run || true

    - name: Performance regression detection
      uses: benchmark-action/github-action-benchmark@a60cea5bc7b49e15c1f58f411161f99e0df48372 # v1
      continue-on-error: true
      with:
        tool: 'cargo'
        output-file-path: target/criterion/reports/index.html
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: false
        comment-on-alert: true
        alert-threshold: '200%'
        fail-on-alert: false

    - name: Record performance metrics
      run: |
        # Extract key performance metrics from benchmark results
        if [ -f target/criterion/reports/index.html ]; then
          # This is a simplified example - in practice you'd parse the HTML/JSON
          echo "performance_test_completed 1" | curl -X POST ${{ env.PROMETHEUS_PUSHGATEWAY }}/metrics/job/ci-performance/instance/${{ github.run_id }}/operation/performance-metrics || true
        fi

  # === Documentation Build (no write permissions; runs on every PR/push) ===
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [test]
    # Read-only: this job builds the docs and tests the doc examples on
    # every PR. The deploy step lives in `docs-deploy` below, which is
    # the only job that needs `contents: write` and only runs on push
    # to main/master. Splitting the privileged surface to one trigger
    # narrows the blast radius of any compromised action invoked here
    # (e.g. a downstream supply-chain incident in `cargo doc` toolchain
    # cannot use this job's token to write to the repo).
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-doc-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Test documentation examples
      run: cargo test --workspace --doc --all-features

    - name: Build documentation
      run: cargo doc --workspace --all-features --no-deps

    - name: Upload docs artifact for the deploy job
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: target-doc
        path: target/doc
        retention-days: 1

  # === Documentation Deploy (push-to-main only; carries contents: write) ===
  docs-deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [docs]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Download docs artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: target-doc
        path: target/doc
    - name: Deploy documentation
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: target/doc
        destination_dir: apache

  # === Integration Tests ===
  integration:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Install Go (required for aws-lc-fips-sys on macOS)
      if: runner.os == 'macOS'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
      with:
        go-version: 'stable'

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-integration-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run end-to-end integration tests
      run: |

        cargo test --test e2e_integration --all-features --release
        cargo test --test unified_api --all-features --release

    - name: Run compliance tests
      run: |

        cargo test --test fips_nist_kat --all-features --release
        cargo test --test fips_compliance --all-features --release

  # === Security Property Tests ===
  security-tests:
    name: Security Property Tests
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-security-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Run security property tests
      run: |

        cargo test --test security_property --all-features --release
        cargo test --test primitives_side_channel_resistance --all-features --release

    - name: Run statistical timing tests
      run: |

        cargo test --test fips_timing --all-features --release

  # === Release Validation ===
  # Uses native compilation without --target flags to avoid cross-compilation issues
  # with aws-lc-rs. See: https://github.com/aws/aws-lc-rs/issues/409
  release-validation:
    name: Release Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, build, security, integration, security-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: x86_64-linux
          - os: macos-latest
            artifact-name: aarch64-macos
          - os: windows-latest
            artifact-name: x86_64-windows

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    # Go is required for aws-lc-fips-sys FIPS builds
    - name: Install Go (macOS)
      if: runner.os == 'macOS'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
      with:
        go-version: 'stable'
        cache: false

    - name: Build release artifacts
      run: cargo build --workspace --release --all-features

    - name: Test release artifacts
      run: cargo test --workspace --release --all-features

    - name: Package and upload artifacts
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: apache-${{ matrix.artifact-name }}
        path: |
          target/release/*latticearc*
          target/release/liblatticearc*
        retention-days: 30

  # === KAT Vector Integrity Check ===
  kat-integrity:
    name: KAT Vector Integrity
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Verify KAT test vector checksums
      run: ./scripts/verify-kat-checksums.sh

  # === Feature Flag Powerset Check (Weekly) ===
  feature-powerset:
    name: Feature Flag Powerset
    runs-on: ubuntu-latest
    needs: [changes, quality]
    if: needs.changes.outputs.is_weekly == 'true' || github.event.inputs.tier == 'weekly'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Install Rust (Edition 2024)
      uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable

    - name: Install cargo-hack
      uses: taiki-e/install-action@1329c298aa20c3257846c9b2e0e55967df3e3c37 # main
      with:
        tool: cargo-hack

    - name: Cache Cargo registry
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-feature-powerset-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Check feature powerset compiles
      run: |
        cargo hack check --feature-powerset --exclude-all-features \
          --exclude-no-default-features \
          -p latticearc

  # === Final Status Check ===
  status-check:
    name: Pipeline Status
    runs-on: ubuntu-latest
    needs: [quality, msrv, semver-checks, build, test, security, regression-tests, concurrency-tests, api-stability-tests, cli-tests, fuzz-nightly, fuzz-weekly, fuzz-smoke, performance, docs, integration, security-tests, feature-powerset, kat-integrity]
    if: always()
    steps:
    - name: Check all job statuses
      run: |
        echo "Checking job statuses..."
        failed_jobs=""

        # Check core jobs (always required)
        [[ "${{ needs.quality.result }}" == "failure" ]] && failed_jobs="$failed_jobs quality"
        [[ "${{ needs.msrv.result }}" == "failure" ]] && failed_jobs="$failed_jobs msrv"
        # Round-14 audit fix: semver-checks added to `needs` so the
        # eventual promotion (drop `continue-on-error: true` on the
        # job, drop the soft-fail comment) becomes a single-line
        # change rather than three coordinated edits. Today this is
        # benign — the job is `continue-on-error: true`, so its
        # `result` will be `'success'` even if `cargo semver-checks`
        # itself emits findings, and this gate stays inert until the
        # promotion lands.
        [[ "${{ needs.semver-checks.result }}" == "failure" ]] && failed_jobs="$failed_jobs semver-checks"
        [[ "${{ needs.build.result }}" == "failure" ]] && failed_jobs="$failed_jobs build"
        [[ "${{ needs.test.result }}" == "failure" ]] && failed_jobs="$failed_jobs test"
        [[ "${{ needs.security.result }}" == "failure" ]] && failed_jobs="$failed_jobs security"
        [[ "${{ needs.docs.result }}" == "failure" ]] && failed_jobs="$failed_jobs docs"
        [[ "${{ needs.integration.result }}" == "failure" ]] && failed_jobs="$failed_jobs integration"
        [[ "${{ needs.security-tests.result }}" == "failure" ]] && failed_jobs="$failed_jobs security-tests"

        # Check new test categories (required when run)
        [[ "${{ needs.regression-tests.result }}" == "failure" ]] && failed_jobs="$failed_jobs regression-tests"
        [[ "${{ needs.concurrency-tests.result }}" == "failure" ]] && failed_jobs="$failed_jobs concurrency-tests"
        [[ "${{ needs.api-stability-tests.result }}" == "failure" ]] && failed_jobs="$failed_jobs api-stability-tests"
        [[ "${{ needs.cli-tests.result }}" == "failure" ]] && failed_jobs="$failed_jobs cli-tests"

        # Round-12 audit fix (H-5), corrected by round-15: fuzz-smoke
        # is the ~30s every-PR job and MUST block merge — a live crash
        # in encrypt_fuzz / hybrid_kem_fuzz was previously silently
        # warned-and-merged. fuzz-nightly / fuzz-weekly remain non-
        # blocking because they run multi-hour campaigns and their
        # flakes shouldn't gate cryptographic-bugfix PRs that haven't
        # yet had time to fix every old finding. (Round-15 fixed
        # `kem_fuzz` typo here — the round-12 H-5 comment named a
        # target that didn't exist.)
        [[ "${{ needs.fuzz-smoke.result }}" == "failure" ]] && failed_jobs="$failed_jobs fuzz-smoke"

        if [[ "${{ needs.fuzz-nightly.result }}" == "failure" ]]; then
          echo "⚠️ Warning: fuzz-nightly failed (non-blocking — see audit fix H-5 rationale)"
        fi
        if [[ "${{ needs.fuzz-weekly.result }}" == "failure" ]]; then
          echo "⚠️ Warning: fuzz-weekly failed (non-blocking — see audit fix H-5 rationale)"
        fi

        if [ -n "$failed_jobs" ]; then
          echo "❌ Critical jobs failed:$failed_jobs"
          echo "PIPELINE_STATUS=failed" >> $GITHUB_ENV
          exit 1
        else
          echo "✅ All critical checks passed!"
          echo "PIPELINE_STATUS=success" >> $GITHUB_ENV
        fi

    - name: Generate pipeline report
      run: |
        echo "## LatticeArc Apache CI/CD Report" > report.md
        echo "- **Repository**: ${{ github.repository }}" >> report.md
        echo "- **Branch**: ${{ github.ref }}" >> report.md
        echo "- **Commit**: ${{ github.sha }}" >> report.md
        echo "- **Status**: ${{ env.PIPELINE_STATUS }}" >> report.md
        echo "- **Timestamp**: $(date -u)" >> report.md
        echo "- **Telemetry**: Enabled (OpenTelemetry + Prometheus)" >> report.md

    - name: Upload pipeline report
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: pipeline-report
        path: report.md