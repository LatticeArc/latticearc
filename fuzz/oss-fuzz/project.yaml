homepage: "https://github.com/LatticeArc/latticearc"
language: rust
primary_contact: "security@latticearc.com"
auto_ccs:
  - "dev@latticearc.com"
main_repo: "https://github.com/LatticeArc/latticearc"
vendor_ccs:
  - "security@latticearc.com"
file_github_issue: true
sanitizers:
  - address
  - memory
  - undefined
fuzzing_engines:
  - libfuzzer
architectures:
  - x86_64
# `memory` is enabled from intake. aws-lc-rs 1.16.3 (released 2026-04-15,
# resolving https://github.com/aws/aws-lc-rs/issues/1077) compiles its
# C sources under MemorySanitizer when `AWS_LC_SYS_SANITIZER=msan` is
# set at build time — `build.sh` wires that env var on `$SANITIZER=memory`.
